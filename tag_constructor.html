<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Конструктор тегов</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --panel-soft: #f9fbfb;
      --border: #d9e1e3;
      --border-strong: #aab7bb;
      --text: #172126;
      --muted: #637178;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --accent-soft: #e3f5f2;
      --danger: #b42318;
      --danger-soft: #fde8e5;
      --warning: #a15c07;
      --warning-soft: #fff1d6;
      --ok: #247346;
      --ok-soft: #e2f4e8;
      --shadow: 0 10px 30px rgba(23, 33, 38, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      min-height: 36px;
      padding: 8px 12px;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      border-color: var(--border-strong);
      background: var(--panel-soft);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    .mode-button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .button-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .danger {
      border-color: #efb5ae;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .ghost {
      background: transparent;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100%;
    }

    .topbar {
      display: grid;
      gap: 10px;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.94);
      position: sticky;
      top: 0;
      z-index: 4;
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .brand strong {
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .search {
      width: 100%;
      min-width: 220px;
      position: relative;
    }

    .search input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      background: var(--panel);
      color: var(--text);
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(230px, 300px) minmax(360px, 1fr) minmax(300px, 380px);
      gap: 14px;
      min-height: 0;
      padding: 14px;
    }

    .shell.macro-mode {
      grid-template-columns: minmax(230px, 300px) minmax(440px, 1fr) minmax(520px, 50vw);
    }

    .pane {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-soft);
    }

    .pane-header h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .pane-body {
      height: calc(100vh - 128px);
      min-height: 420px;
      overflow: auto;
      padding: 12px;
    }

    .groups {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .group-section-title {
      margin: 4px 2px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .group-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .group-button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      text-align: left;
    }

    .group-button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .group-button.no-macros {
      border-style: dashed;
      opacity: 0.76;
    }

    .group-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .group-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .count-pill {
      align-self: center;
      border-radius: 999px;
      background: #eef2f2;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      display: grid;
      gap: 2px;
      min-width: 110px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      background: var(--panel-soft);
    }

    .stat strong {
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .message {
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: var(--panel-soft);
      color: var(--muted);
    }

    .message.error {
      border-color: #f4b8b2;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .message.warning {
      border-color: #ffd58f;
      background: var(--warning-soft);
      color: var(--warning);
    }

    .tag-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .macro-list {
      display: block;
      min-width: 0;
    }

    .macro-browser {
      display: grid;
      gap: 14px;
    }

    .macro-tag-filters {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 8px;
    }

    .tag-card {
      display: grid;
      gap: 8px;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 11px;
      background: var(--panel);
      text-align: left;
      cursor: pointer;
    }

    .tag-card:hover {
      border-color: var(--border-strong);
      background: var(--panel-soft);
    }

    .tag-card:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .tag-card.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .tag-card.archived {
      border-style: dashed;
      opacity: 0.72;
    }

    .tag-card.no-macros {
      border-style: dashed;
      background: #fff8eb;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .macro-card {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
      height: 230px;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 11px;
      background: var(--panel);
      text-align: left;
      cursor: pointer;
      overflow: hidden;
    }

    .macro-card:hover {
      border-color: var(--border-strong);
      background: var(--panel-soft);
    }

    .macro-card.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .macro-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .macro-tags,
    .macro-tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .tag-combobox {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      padding: 6px;
    }

    .tag-combobox:focus-within {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .tag-combobox .macro-tag-chips {
      display: contents;
    }

    .field .tag-combobox input {
      flex: 1 1 180px;
      min-width: 160px;
      min-height: 28px;
      border: 0;
      outline: 0;
      padding: 3px 4px;
      background: transparent;
    }

    .macro-preview {
      min-height: 0;
      color: var(--muted);
      overflow: hidden;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
    }

    .chip-button {
      border-radius: 999px;
      min-height: 26px;
      padding: 3px 9px;
      color: var(--accent-strong);
      border-color: #b8deda;
      background: #f1fbf9;
      font-size: 12px;
      font-weight: 700;
    }

    .chip-button .remove-mark {
      margin-left: 5px;
      color: var(--danger);
    }

    .chip-button.warn {
      color: var(--warning);
      border-color: #ffd58f;
      background: var(--warning-soft);
    }

    .autocomplete {
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 8;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .suggestions:empty {
      display: none;
    }

    .suggestion-button {
      display: grid;
      gap: 2px;
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 0;
      padding: 8px 10px;
      text-align: left;
      background: var(--panel);
    }

    .suggestion-button:hover,
    .suggestion-button.active {
      background: var(--accent-soft);
    }

    .suggestion-main {
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 800;
    }

    .suggestion-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .wysiwyg-shell {
      display: grid;
      gap: 8px;
    }

    .wysiwyg-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px;
      background: var(--panel-soft);
    }

    .wysiwyg-toolbar button {
      min-height: 30px;
      padding: 4px 9px;
      font-weight: 700;
    }

    .wysiwyg-editor,
    .raw-markdown {
      width: 100%;
      min-height: 360px;
      max-height: calc(100vh - 420px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      padding: 12px;
    }

    .wysiwyg-editor:focus,
    .raw-markdown:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .wysiwyg-editor p,
    .wysiwyg-editor h1,
    .wysiwyg-editor h2,
    .wysiwyg-editor h3,
    .wysiwyg-editor ul {
      margin: 0 0 10px;
    }

    .wysiwyg-editor code {
      border-radius: 4px;
      background: #eef2f2;
      padding: 1px 4px;
      font-family: "Cascadia Mono", Consolas, monospace;
    }

    .raw-markdown {
      display: none;
      resize: vertical;
      font-family: "Cascadia Mono", Consolas, monospace;
      white-space: pre-wrap;
    }

    .raw-mode .wysiwyg-editor {
      display: none;
    }

    .raw-mode .raw-markdown {
      display: block;
    }

    .tag-top {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
    }

    .tag-code {
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .copy-tag-button {
      color: var(--accent);
      border-color: #b8deda;
      background: #f1fbf9;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      background: #edf1f1;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.ok {
      background: var(--ok-soft);
      color: var(--ok);
    }

    .badge.warn {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .badge.error {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .tag-label {
      font-weight: 700;
    }

    .tag-usage {
      color: var(--muted);
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 10px;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .search input:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .split-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tag-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px dashed var(--border-strong);
      border-radius: 7px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .validation-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding-left: 18px;
    }

    .hidden-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 1120px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .shell {
        grid-template-columns: minmax(220px, 280px) minmax(360px, 1fr);
      }

      .shell.macro-mode {
        grid-template-columns: minmax(220px, 280px) minmax(360px, 1fr);
      }

      .editor-pane {
        grid-column: 1 / -1;
      }

      .pane-body {
        height: auto;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .shell {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .shell.macro-mode {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 12px;
      }

      .toolbar button,
      .toolbar label,
      .actions button,
      .split-actions button {
        width: 100%;
      }

      .split-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <strong>Конструктор тегов</strong>
        <span id="fileStatus">CSV не загружен</span>
      </div>
      <div class="search">
        <input id="searchInput" type="search" placeholder="Поиск по tag, label, usage или category" autocomplete="off">
      </div>
      <div class="toolbar">
        <input id="fileInput" class="hidden-input" type="file" accept=".csv,text/csv,text/plain,application/csv,application/vnd.ms-excel,application/octet-stream">
        <button id="importButton" type="button">Импорт</button>
        <button id="modeTagsButton" class="mode-button active" type="button">Tags</button>
        <button id="modeMacrosButton" class="mode-button" type="button">Macros</button>
        <button id="exportTagImportButton" type="button">Экспорт</button>
        <button id="saveDownloadButton" class="primary" type="button">Save and Download</button>
      </div>
    </header>

    <main id="shell" class="shell">
      <section class="pane">
        <div class="pane-header">
          <h2>Группы</h2>
          <button id="newGroupButton" type="button">+ Группа</button>
        </div>
        <div class="pane-body">
          <div id="groupList" class="groups"></div>
        </div>
      </section>

      <section class="pane">
        <div class="pane-header">
          <h2 id="tagPaneTitle">Теги</h2>
          <button id="newTagButton" type="button" disabled>+ Тег</button>
        </div>
        <div class="pane-body">
          <div id="stats" class="stats"></div>
          <div id="validationBox"></div>
          <div id="tagList" class="tag-grid"></div>
        </div>
      </section>

      <section class="pane editor-pane">
        <div class="pane-header">
          <h2 id="editorTitle">Редактор</h2>
          <button id="clearSelectionButton" class="ghost" type="button">Сброс</button>
        </div>
        <div id="editorBody" class="pane-body"></div>
      </section>
    </main>
  </div>

  <script>
    const HEADERS = ["field", "tag", "category", "ru_label", "usage", "operator_selectable"];
    const IMPORT_HEADERS = ["tag", "category", "ru_label", "usage"];
    const CORE_FIELDS = ["user", "conversation"];
    const VALID_SELECTABLE = new Set(["yes", "no"]);
    const FIELD_PATTERN = /^[a-z][a-z0-9_]*$/;
    const TAG_PATTERN = /^[a-z0-9_]+(\.[a-z0-9_]+)+$/;

    const state = {
      mode: "tags",
      rows: [],
      macros: [],
      selectedGroupKey: "",
      selectedTagId: "",
      selectedMacroId: "",
      editorMode: "empty",
      search: "",
      fileName: "",
      macroFileName: "",
      nextId: 1,
      nextMacroId: 1
    };

    const els = {
      fileStatus: document.getElementById("fileStatus"),
      fileInput: document.getElementById("fileInput"),
      importButton: document.getElementById("importButton"),
      modeTagsButton: document.getElementById("modeTagsButton"),
      modeMacrosButton: document.getElementById("modeMacrosButton"),
      exportTagImportButton: document.getElementById("exportTagImportButton"),
      saveDownloadButton: document.getElementById("saveDownloadButton"),
      shell: document.getElementById("shell"),
      searchInput: document.getElementById("searchInput"),
      groupList: document.getElementById("groupList"),
      tagList: document.getElementById("tagList"),
      tagPaneTitle: document.getElementById("tagPaneTitle"),
      newTagButton: document.getElementById("newTagButton"),
      newGroupButton: document.getElementById("newGroupButton"),
      stats: document.getElementById("stats"),
      validationBox: document.getElementById("validationBox"),
      editorTitle: document.getElementById("editorTitle"),
      editorBody: document.getElementById("editorBody"),
      clearSelectionButton: document.getElementById("clearSelectionButton")
    };

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function makeId() {
      const id = "tag-" + state.nextId;
      state.nextId += 1;
      return id;
    }

    function makeMacroId() {
      const id = "macro-" + state.nextMacroId;
      state.nextMacroId += 1;
      return id;
    }

    function groupKey(field, category) {
      return field + "::" + category;
    }

    function splitGroupKey(key) {
      const index = key.indexOf("::");
      if (index === -1) {
        return { field: "", category: "" };
      }
      return {
        field: key.slice(0, index),
        category: key.slice(index + 2)
      };
    }

    function getGroupRows(key) {
      const group = splitGroupKey(key);
      return state.rows.filter(row => row.field === group.field && row.category === group.category);
    }

    function getSelectedTag() {
      return state.rows.find(row => row.id === state.selectedTagId) || null;
    }

    function getSelectedMacro() {
      return state.macros.find(macro => macro.id === state.selectedMacroId) || null;
    }

    function getKnownTags() {
      return new Set(state.rows.map(row => row.tag).filter(Boolean));
    }

    function parseTagList(value) {
      return Array.from(new Set(String(value || "")
        .split(",")
        .map(normalizeText)
        .filter(Boolean)));
    }

    function parseCsv(text) {
      const input = String(text || "").replace(/^\uFEFF/, "");
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < input.length; i += 1) {
        const char = input[i];
        const next = input[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            value += '"';
            i += 1;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            value += char;
          }
          continue;
        }

        if (char === '"') {
          inQuotes = true;
        } else if (char === ";") {
          row.push(value);
          value = "";
        } else if (char === "\n") {
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else if (char !== "\r") {
          value += char;
        }
      }

      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }

      const nonEmptyRows = rows.filter(items => items.some(item => normalizeText(item)));
      if (!nonEmptyRows.length) {
        return [];
      }

      const headers = nonEmptyRows[0].map(normalizeText);
      const missing = HEADERS.filter(header => !headers.includes(header));
      if (missing.length) {
        throw new Error("В CSV нет колонок: " + missing.join(", "));
      }

      return nonEmptyRows.slice(1).map(items => {
        const rowObject = { id: makeId() };
        headers.forEach((header, index) => {
          rowObject[header] = normalizeText(items[index]);
        });
        HEADERS.forEach(header => {
          if (!(header in rowObject)) {
            rowObject[header] = "";
          }
        });
        return rowObject;
      });
    }

    function csvValue(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function serializeCsv(rows, headers) {
      const lines = [
        headers.map(csvValue).join(";"),
        ...rows.map(row => headers.map(header => csvValue(row[header])).join(";"))
      ];
      return "\uFEFF" + lines.join("\r\n") + "\r\n";
    }

    function downloadCsv(fileName, rows, headers) {
      const blob = new Blob([serializeCsv(rows, headers)], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadText(fileName, text, type) {
      const blob = new Blob([text], { type: type || "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function importRows(rows, fileName) {
      state.rows = rows;
      state.fileName = fileName || "helpdesk_tag_taxonomy.csv";
      state.selectedTagId = "";
      state.selectedMacroId = "";
      const firstGroup = getGroups()[0];
      state.selectedGroupKey = firstGroup ? firstGroup.key : "";
      state.editorMode = state.selectedGroupKey ? "group" : "empty";
      render();
    }

    function parseMacrosMarkdown(text) {
      const normalized = String(text || "").replace(/^\uFEFF/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const blocks = normalized.split(/^---\s*$/m).map(block => block.trim()).filter(Boolean);
      return blocks.map((block, index) => {
        const lines = block.split("\n");
        const titleLine = normalizeText(lines.shift());
        const tagLine = normalizeText(lines.shift());
        if (!titleLine.startsWith("# ")) {
          throw new Error("Макрос " + (index + 1) + ": заголовок должен начинаться с #.");
        }
        if (!tagLine.startsWith("[tag]")) {
          throw new Error("Макрос " + (index + 1) + ": вторая строка должна начинаться с [tag].");
        }
        return {
          id: makeMacroId(),
          title: normalizeText(titleLine.replace(/^#+\s*/, "")),
          tags: parseTagList(tagLine.replace(/^\[tag\]\s*/, "")),
          body: lines.join("\n").trim()
        };
      });
    }

    function serializeMacrosMarkdown(macros) {
      return macros.map(macro => [
        "# " + normalizeText(macro.title),
        "[tag] " + macro.tags.map(normalizeText).filter(Boolean).join(", "),
        normalizeText(macro.body),
        "---"
      ].join("\n")).join("\n\n") + "\n";
    }

    function importMacros(macros, fileName) {
      state.macros = macros;
      state.macroFileName = fileName || "macros_markdown.txt";
      state.selectedMacroId = "";
      state.editorMode = state.selectedGroupKey ? "group" : "empty";
      render();
    }

    function getGroups() {
      const map = new Map();
      state.rows.forEach(row => {
        const key = groupKey(row.field, row.category);
        if (!map.has(key)) {
          map.set(key, {
            key,
            field: row.field,
            category: row.category,
            total: 0,
            active: 0,
            archived: 0
          });
        }
        const group = map.get(key);
        group.total += 1;
        if (row.operator_selectable === "yes") {
          group.active += 1;
        } else {
          group.archived += 1;
        }
      });

      return Array.from(map.values()).sort((a, b) => {
        const fieldOrder = a.field.localeCompare(b.field, "ru");
        if (fieldOrder !== 0) {
          return fieldOrder;
        }
        return a.category.localeCompare(b.category, "ru");
      });
    }

    function getFields() {
      const fields = new Set(CORE_FIELDS);
      state.rows.forEach(row => {
        if (row.field) {
          fields.add(row.field);
        }
      });
      return Array.from(fields).sort(compareFields);
    }

    function getMacroCountForTag(tag) {
      return state.macros.filter(macro => macro.tags.includes(tag)).length;
    }

    function getGroupTagSet(key) {
      return new Set(getGroupRows(key).map(row => row.tag).filter(Boolean));
    }

    function getMacroCountForGroup(key) {
      if (!key) {
        return state.macros.length;
      }
      const tags = getGroupTagSet(key);
      if (!tags.size) {
        return 0;
      }
      return state.macros.filter(macro => macro.tags.some(tag => tags.has(tag))).length;
    }

    function compareFields(a, b) {
      const aIndex = CORE_FIELDS.indexOf(a);
      const bIndex = CORE_FIELDS.indexOf(b);
      if (aIndex !== -1 || bIndex !== -1) {
        if (aIndex === -1) {
          return 1;
        }
        if (bIndex === -1) {
          return -1;
        }
        return aIndex - bIndex;
      }
      return a.localeCompare(b, "ru");
    }

    function fieldTitle(field) {
      if (field === "__all__") {
        return "ALL";
      }
      if (field === "user") {
        return "User Tags";
      }
      if (field === "conversation") {
        return "Conversation Tags";
      }
      return field + " Tags";
    }

    function renderFieldOptions(selectedField) {
      const fields = getFields();
      if (selectedField && !fields.includes(selectedField)) {
        fields.push(selectedField);
      }
      return fields.map(field => (
        '<option value="' + escapeHtml(field) + '"' + selected(field, selectedField) + '>' + escapeHtml(field) + '</option>'
      )).join("");
    }

    function renderFieldModeControl(selectedField) {
      return [
        '<div class="field"><label>Field</label><select id="fieldMode" name="fieldMode">',
        renderFieldOptions(selectedField),
        '<option value="__new__">Создать новый field</option>',
        '</select></div>',
        '<div class="field" id="newFieldRow" style="display:none"><label>Новый field</label><input id="newFieldInput" name="new_field" placeholder="product"></div>'
      ].join("");
    }

    function setupFieldModeControl() {
      const fieldMode = document.getElementById("fieldMode");
      const newFieldRow = document.getElementById("newFieldRow");
      const newFieldInput = document.getElementById("newFieldInput");
      if (!fieldMode || !newFieldRow || !newFieldInput) {
        return;
      }
      const syncNewField = () => {
        const isNewField = fieldMode.value === "__new__";
        newFieldRow.style.display = isNewField ? "" : "none";
        newFieldInput.required = isNewField;
        newFieldInput.disabled = !isNewField;
        if (isNewField) {
          newFieldInput.focus();
        }
      };
      fieldMode.addEventListener("change", syncNewField);
      syncNewField();
    }

    function resolveFieldFromForm(raw) {
      const field = raw.fieldMode === "__new__" ? normalizeText(raw.new_field) : normalizeText(raw.fieldMode || raw.field);
      if (!field) {
        alert("Field не может быть пустым.");
        return "";
      }
      if (!FIELD_PATTERN.test(field)) {
        alert("Field должен быть lowercase latin/digits/underscore и начинаться с буквы.");
        return "";
      }
      return field;
    }

    function rowMatchesSearch(row) {
      if (!state.search) {
        return true;
      }
      const haystack = [
        row.field,
        row.tag,
        row.category,
        row.ru_label,
        row.usage,
        row.operator_selectable
      ].join(" ").toLowerCase();
      return haystack.includes(state.search.toLowerCase());
    }

    function macroMatchesSearch(macro) {
      if (!state.search) {
        return true;
      }
      const needle = state.search.toLowerCase();
      const tagMatch = macro.tags.some(tag => tag.toLowerCase().includes(needle));
      if (tagMatch) {
        return true;
      }
      const haystack = [macro.title, macro.body].join(" ").toLowerCase();
      return haystack.includes(needle);
    }

    function macroMatchesScope(macro) {
      if (!state.selectedGroupKey && !state.selectedTagId) {
        return true;
      }
      if (state.selectedTagId) {
        const tag = getSelectedTag();
        return tag ? macro.tags.includes(tag.tag) : true;
      }
      if (state.selectedGroupKey) {
        const tags = getGroupTagSet(state.selectedGroupKey);
        return !tags.size || macro.tags.some(tag => tags.has(tag));
      }
      return true;
    }

    function getVisibleMacros() {
      return state.macros
        .filter(macroMatchesScope)
        .filter(macroMatchesSearch)
        .sort((a, b) => a.title.localeCompare(b.title, "ru"));
    }

    function groupMatchesSearch(group) {
      if (!state.search) {
        return true;
      }
      const ownText = [group.field, group.category].join(" ").toLowerCase();
      if (ownText.includes(state.search.toLowerCase())) {
        return true;
      }
      if (state.mode === "macros") {
        const tags = getGroupTagSet(group.key);
        if (Array.from(tags).some(tag => tag.toLowerCase().includes(state.search.toLowerCase()))) {
          return true;
        }
        return state.macros.some(macro => macro.tags.some(tag => tags.has(tag)) && macroMatchesSearch(macro));
      }
      return getGroupRows(group.key).some(rowMatchesSearch);
    }

    function validateRows() {
      const errors = [];
      const warnings = [];
      const byTag = new Map();

      state.rows.forEach((row, index) => {
        const line = index + 2;
        HEADERS.forEach(header => {
          if (!normalizeText(row[header])) {
            errors.push("Строка " + line + ": пустое поле " + header + ".");
          }
        });

        if (row.field && !FIELD_PATTERN.test(row.field)) {
          errors.push("Строка " + line + ": field должен быть lowercase latin/digits/underscore и начинаться с буквы.");
        }

        if (row.operator_selectable && !VALID_SELECTABLE.has(row.operator_selectable)) {
          errors.push("Строка " + line + ": operator_selectable должен быть yes или no.");
        }

        if (row.tag && !TAG_PATTERN.test(row.tag)) {
          errors.push("Строка " + line + ": неверное имя тега " + row.tag + ".");
        }

        if (row.tag) {
          if (!byTag.has(row.tag)) {
            byTag.set(row.tag, []);
          }
          byTag.get(row.tag).push(line);
        }

        const parts = String(row.tag || "").split(".");
        const expectedCategory = parts[0] === row.field ? parts[1] : parts[0];
        if (row.category && expectedCategory && row.category !== expectedCategory) {
          warnings.push("Строка " + line + ": category " + row.category + " не совпадает с ожидаемым сегментом " + expectedCategory + " для " + row.tag + ".");
        }
      });

      byTag.forEach((lines, tag) => {
        if (lines.length > 1) {
          errors.push("Дубль tag " + tag + " в строках " + lines.join(", ") + ".");
        }
      });

      return { errors, warnings };
    }

    function validateMacros() {
      const errors = [];
      const warnings = [];
      const knownTags = getKnownTags();

      state.macros.forEach((macro, index) => {
        const number = index + 1;
        if (!normalizeText(macro.title)) {
          errors.push("Макрос " + number + ": пустой заголовок.");
        }
        if (!normalizeText(macro.body)) {
          errors.push("Макрос " + number + ": пустое тело.");
        }
        if (!macro.tags.length) {
          errors.push("Макрос " + number + ": нет тегов.");
        }
        macro.tags.forEach(tag => {
          if (!TAG_PATTERN.test(tag)) {
            errors.push("Макрос " + number + ": неверное имя тега " + tag + ".");
          } else if (!knownTags.has(tag)) {
            warnings.push("Макрос " + number + ": тег " + tag + " не найден в taxonomy.");
          }
        });
      });

      return { errors, warnings };
    }

    function getStats(validation) {
      const activeUser = state.rows.filter(row => row.field === "user" && row.operator_selectable === "yes").length;
      const activeConversation = state.rows.filter(row => row.field === "conversation" && row.operator_selectable === "yes").length;
      const fieldCount = getFields().filter(field => state.rows.some(row => row.field === field)).length;
      const archived = state.rows.filter(row => row.operator_selectable === "no").length;
      return [
        { label: "User active", value: activeUser },
        { label: "Conversation active", value: activeConversation },
        { label: "Fields", value: fieldCount },
        { label: "Archived", value: archived },
        { label: "Errors", value: validation.errors.length },
        { label: "Warnings", value: validation.warnings.length }
      ];
    }

    function getMacroStats(validation) {
      const usedTags = new Set();
      state.macros.forEach(macro => {
        macro.tags.forEach(tag => usedTags.add(tag));
      });
      return [
        { label: "Macros", value: state.macros.length },
        { label: "Used tags", value: usedTags.size },
        { label: "Visible", value: getVisibleMacros().length },
        { label: "Errors", value: validation.errors.length },
        { label: "Warnings", value: validation.warnings.length }
      ];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function iconSvg(name) {
      const icons = {
        import: '<path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M4 15v3a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-3"></path>',
        export: '<path d="M12 21V9"></path><path d="m17 16-5 5-5-5"></path><path d="M4 9V6a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v3"></path>',
        tags: '<path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0L3 13V3h10l7.6 7.6a2 2 0 0 1 0 2.8Z"></path><path d="M7.5 7.5h.01"></path>',
        macros: '<path d="M8 7H5a2 2 0 0 0-2 2v1a2 2 0 0 0 2 2h3"></path><path d="M16 7h3a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-3"></path><path d="M8 17h8"></path><path d="M8 12h8"></path>',
        save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path>'
      };
      return '<svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">' + (icons[name] || "") + '</svg>';
    }

    function setButtonContent(button, icon, label) {
      button.innerHTML = iconSvg(icon) + '<span>' + escapeHtml(label) + '</span>';
    }

    function render() {
      const validation = validateRows();
      const macroValidation = validateMacros();
      const hasErrors = validation.errors.length > 0;
      const hasRows = state.rows.length > 0;
      const hasMacros = state.macros.length > 0;
      const hasMacroErrors = macroValidation.errors.length > 0;

      els.fileStatus.textContent = state.mode === "tags"
        ? (hasRows ? state.fileName + " | " + state.rows.length + " строк" : "CSV не загружен")
        : [
          hasRows ? "taxonomy: " + state.rows.length + " строк" : "taxonomy не загружена",
          hasMacros ? (state.macroFileName + " | " + state.macros.length + " макросов") : "macros не загружены"
        ].join(" | ");

      els.modeTagsButton.classList.toggle("active", state.mode === "tags");
      els.modeMacrosButton.classList.toggle("active", state.mode === "macros");
      els.shell.classList.toggle("macro-mode", state.mode === "macros");
      els.tagList.className = state.mode === "macros" ? "macro-list" : "tag-grid";
      els.saveDownloadButton.disabled = state.mode === "tags" ? (!hasRows || hasErrors) : (!hasMacros || hasMacroErrors);
      els.exportTagImportButton.style.display = state.mode === "tags" ? "" : "none";
      els.exportTagImportButton.disabled = !hasRows || hasErrors;
      setButtonContent(els.importButton, "import", "Импорт");
      setButtonContent(els.modeTagsButton, "tags", "Tags");
      setButtonContent(els.modeMacrosButton, "macros", "Macros");
      setButtonContent(els.exportTagImportButton, "export", "Экспорт");
      setButtonContent(els.saveDownloadButton, "save", "Save and Download");
      els.fileInput.accept = state.mode === "tags"
        ? ".csv,text/csv,text/plain,application/csv,application/vnd.ms-excel,application/octet-stream"
        : ".txt,.md,text/plain,text/markdown";
      els.searchInput.placeholder = state.mode === "tags"
        ? "Поиск по tag, label, usage или category"
        : "Поиск по тегам, названию или тексту макроса";
      els.newGroupButton.style.display = state.mode === "tags" ? "" : "none";
      els.newTagButton.textContent = state.mode === "tags" ? "+ Тег" : "+ Макрос";

      renderStats(state.mode === "tags" ? validation : macroValidation);
      renderValidation(state.mode === "tags" ? validation : macroValidation);
      renderGroups();
      renderTags();
      renderEditor();
    }

    function renderStats(validation) {
      const stats = state.mode === "tags" ? getStats(validation) : getMacroStats(validation);
      els.stats.innerHTML = stats.map(item => (
        '<div class="stat"><strong>' + item.value + '</strong><span>' + escapeHtml(item.label) + '</span></div>'
      )).join("");
    }

    function renderValidation(validation) {
      if (state.mode === "macros") {
        if (!state.macros.length) {
          els.validationBox.innerHTML = '<div class="message">Загрузите macros_markdown.txt, чтобы начать редактирование макросов.</div>';
          return;
        }
        if (validation.errors.length) {
          const items = validation.errors.slice(0, 6).map(error => '<li>' + escapeHtml(error) + '</li>').join("");
          const more = validation.errors.length > 6 ? '<li>Еще ошибок: ' + (validation.errors.length - 6) + '.</li>' : "";
          els.validationBox.innerHTML = '<div class="message error"><strong>Экспорт макросов заблокирован.</strong><ul class="validation-list">' + items + more + '</ul></div>';
          return;
        }
        if (validation.warnings.length) {
          const items = validation.warnings.slice(0, 4).map(warning => '<li>' + escapeHtml(warning) + '</li>').join("");
          const more = validation.warnings.length > 4 ? '<li>Еще предупреждений: ' + (validation.warnings.length - 4) + '.</li>' : "";
          els.validationBox.innerHTML = '<div class="message warning"><strong>Можно экспортировать, есть неизвестные теги.</strong><ul class="validation-list">' + items + more + '</ul></div>';
          return;
        }
        els.validationBox.innerHTML = '<div class="message"><strong>Проверка макросов пройдена.</strong> Можно экспортировать macros_markdown.txt.</div>';
        return;
      }

      if (!state.rows.length) {
        els.validationBox.innerHTML = '<div class="message">Загрузите helpdesk_tag_taxonomy.csv, чтобы начать редактирование.</div>';
        return;
      }

      if (validation.errors.length) {
        const items = validation.errors.slice(0, 6).map(error => '<li>' + escapeHtml(error) + '</li>').join("");
        const more = validation.errors.length > 6 ? '<li>Еще ошибок: ' + (validation.errors.length - 6) + '.</li>' : "";
        els.validationBox.innerHTML = '<div class="message error"><strong>Экспорт заблокирован.</strong><ul class="validation-list">' + items + more + '</ul></div>';
        return;
      }

      if (validation.warnings.length) {
        const items = validation.warnings.slice(0, 4).map(warning => '<li>' + escapeHtml(warning) + '</li>').join("");
        const more = validation.warnings.length > 4 ? '<li>Еще предупреждений: ' + (validation.warnings.length - 4) + '.</li>' : "";
        els.validationBox.innerHTML = '<div class="message warning"><strong>Можно экспортировать, есть предупреждения.</strong><ul class="validation-list">' + items + more + '</ul></div>';
        return;
      }

      els.validationBox.innerHTML = '<div class="message"><strong>Проверка пройдена.</strong> Можно экспортировать файлы.</div>';
    }

    function renderGroups() {
      const groups = getGroups().filter(groupMatchesSearch);
      if (!groups.length && state.mode !== "macros") {
        els.groupList.innerHTML = '<div class="empty">Группы не найдены.</div>';
        return;
      }

      const sections = Array.from(new Set(groups.map(group => group.field)))
        .sort(compareFields)
        .map(field => ({ field, title: fieldTitle(field) }));

      const allSection = state.mode === "macros"
        ? [
          '<div><div class="group-section-title">ALL</div><div class="group-list">',
          '<button class="group-button' + (!state.selectedGroupKey && !state.selectedTagId ? " active" : "") + '" type="button" data-all-macros="1">',
          '<span><span class="group-name">all</span><span class="group-meta">все макросы</span></span>',
          '<span class="count-pill">' + state.macros.length + '</span>',
          '</button>',
          '</div></div>'
        ].join("")
        : "";

      const groupSections = sections.map(section => {
        const sectionGroups = groups.filter(group => group.field === section.field);
        if (!sectionGroups.length) {
          return "";
        }
        const list = sectionGroups.map(group => {
          const isActive = group.key === state.selectedGroupKey ? " active" : "";
          const macroCount = state.mode === "macros" ? getMacroCountForGroup(group.key) : 0;
          const noMacros = state.mode === "macros" && macroCount === 0 ? " no-macros" : "";
          const archivedText = group.archived ? " | архив: " + group.archived : "";
          const metaText = state.mode === "macros"
            ? escapeHtml(group.field) + " | тегов: " + group.total
            : escapeHtml(group.field) + archivedText;
          const countText = state.mode === "macros" ? macroCount : (group.active + '/' + group.total);
          return [
            '<button class="group-button' + isActive + noMacros + '" type="button" data-group="' + escapeHtml(group.key) + '">',
            '<span><span class="group-name">' + escapeHtml(group.category) + '</span>',
            '<span class="group-meta">' + metaText + '</span></span>',
            '<span class="count-pill">' + countText + '</span>',
            '</button>'
          ].join("");
        }).join("");

        return '<div><div class="group-section-title">' + section.title + '</div><div class="group-list">' + list + '</div></div>';
      }).join("");

      els.groupList.innerHTML = allSection + groupSections;

    function renderTags() {

    function createTagCopy(source) {
      const row = {
        id: makeId(),
        field: source.field,
        tag: makeCopiedTagName(source.tag),
        category: source.category,
        ru_label: source.ru_label,
        usage: source.usage,
        operator_selectable: source.operator_selectable || "yes"
      };
      state.rows.push(row);
      state.selectedGroupKey = groupKey(row.field, row.category);
      state.selectedTagId = row.id;
      state.editorMode = "tag";
      state.search = "";
      els.searchInput.value = "";
      render();
      focusTagInput();
    }

    function makeCopiedTagName(tag) {
      const base = normalizeText(tag) || "tag.copy";
      const existing = new Set(state.rows.map(row => row.tag));
      let index = 1;
      let candidate = base + "_copy";
      while (existing.has(candidate)) {
        index += 1;
        candidate = base + "_copy_" + index;
      }
      return candidate;
    }

    function focusTagInput() {
      const input = document.getElementById("tagInput");
      if (!input) {
        return false;
      }
      input.focus();
      input.select();
      if (input.setSelectionRange) {
        input.setSelectionRange(0, input.value.length);
      }
      return true;
    }

    function renderMacroForm(macro, draft) {
      const isNew = !macro;
      const data = macro || draft || { title: "", tags: [], body: "" };
      const knownTags = getKnownTags();
      const tagBadges = data.tags.map(tag => {
        const badgeClass = knownTags.has(tag) ? "ok" : "warn";

      els.editorTitle.textContent = isNew ? "Новый макрос" : "Макрос";

        '<div class="field autocomplete"><label>Теги</label><div class="tag-combobox"><div id="macroSelectedTags" class="macro-tag-chips">' + tagBadges + '</div><input id="macroTagSearch" type="search" placeholder="Начните вводить тег или label" autocomplete="off"></div><input id="macroTagsInput" name="tags" type="hidden" value="' + escapeHtml(data.tags.join(", ")) + '"><div id="macroTagSuggestions" class="suggestions"></div></div>',
        renderWysiwygEditor(data.body),
        '<div class="actions"><button class="primary" type="submit">' + (isNew ? "Создать макрос" : "Сохранить макрос") + '</button></div>',
        isNew ? "" : [
          '<div class="split-actions tag-actions">',
          '<button id="copyMacro" class="copy-tag-button" type="button">Копировать макрос</button>',
          '<button id="deleteMacro" class="danger" type="button">Удалить макрос</button>',
          '</div>'
        ].join(""),
        '</form>'
      ].join("");

      setupMacroTagControls();
      setupWysiwygEditor();

      document.getElementById("macroForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.currentTarget));
        const body = getMacroEditorMarkdown();
        if (!body) {
          alert("Markdown не может быть пустым.");
          return;
        }
        const tags = parseTagList(form.tags);
        if (!tags.length) {
          alert("Добавьте хотя бы один тег.");
          return;
        }
        const next = {
          id: macro ? macro.id : makeMacroId(),
          title: normalizeText(form.title),
          tags,
          body
        };
        if (macro) {
          Object.assign(macro, next);
        } else {
          state.macros.push(next);
          state.selectedMacroId = next.id;
        }
        state.editorMode = "macro";
        render();
      });

      const copyButton = document.getElementById("copyMacro");
      if (copyButton && macro) {
        copyButton.addEventListener("click", () => {
          createMacroCopy(macro);
        });
      }

      const deleteButton = document.getElementById("deleteMacro");
      if (deleteButton && macro) {
        deleteButton.addEventListener("click", () => {
          if (!confirm("Удалить макрос " + macro.title + "?")) {
            return;
          }
          state.macros = state.macros.filter(item => item.id !== macro.id);
          state.selectedMacroId = "";
          state.editorMode = "group";
          render();
        });
      }
    }

    function renderWysiwygEditor(markdown) {
      return [
        '<div id="macroWysiwygShell" class="field wysiwyg-shell">',
        '<label>Markdown</label>',
        '<div class="wysiwyg-toolbar" aria-label="Markdown toolbar">',
        '<button type="button" data-format="bold">B</button>',
        '<button type="button" data-format="italic">I</button>',
        '<button type="button" data-format="heading2">H2</button>',
        '<button type="button" data-format="heading3">H3</button>',
        '<button type="button" data-format="bullet">• List</button>',
        '<button type="button" data-format="link">Link</button>',
        '<button type="button" data-format="code">Code</button>',
        '<button type="button" data-format="raw">Raw</button>',
        '</div>',
        '<div id="macroBodyEditor" class="wysiwyg-editor" contenteditable="true">' + markdownToEditorHtml(markdown) + '</div>',
        '<textarea id="macroRawBody" class="raw-markdown">' + escapeHtml(markdown) + '</textarea>',
        '</div>'
      ].join("");
    }

    function setupWysiwygEditor() {
      const shell = document.getElementById("macroWysiwygShell");
      const editor = document.getElementById("macroBodyEditor");
      const raw = document.getElementById("macroRawBody");
      if (!shell || !editor || !raw) {
        return;
      }

      shell.querySelectorAll("[data-format]").forEach(button => {
        button.addEventListener("click", () => {
          const format = button.getAttribute("data-format");
          if (format === "raw") {
            if (shell.classList.contains("raw-mode")) {
              editor.innerHTML = markdownToEditorHtml(raw.value);
              shell.classList.remove("raw-mode");
              editor.focus();
            } else {
              raw.value = editorHtmlToMarkdown(editor);
              shell.classList.add("raw-mode");
              raw.focus();
            }
            return;
          }

          if (shell.classList.contains("raw-mode")) {
            return;
          }
          applyWysiwygFormat(format);
          editor.focus();
        });
      });
    }

    function applyWysiwygFormat(format) {
      if (format === "bold") {
        document.execCommand("bold", false, null);
        return;
      }
      if (format === "italic") {
        document.execCommand("italic", false, null);
        return;
      }
      if (format === "heading2") {
        document.execCommand("formatBlock", false, "h2");
        return;
      }
      if (format === "heading3") {
        document.execCommand("formatBlock", false, "h3");
        return;
      }
      if (format === "bullet") {
        document.execCommand("insertUnorderedList", false, null);
        return;
      }
      if (format === "link") {
        const url = normalizeText(prompt("URL для ссылки"));
        if (url) {
          document.execCommand("createLink", false, url);
        }
        return;
      }
      if (format === "code") {
        const selection = window.getSelection();
        const text = selection && selection.toString() ? selection.toString() : "code";
        document.execCommand("insertHTML", false, "<code>" + escapeHtml(text) + "</code>");
      }
    }

    function markdownToEditorHtml(markdown) {
      const lines = String(markdown || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const html = [];
      let inList = false;
      const closeList = () => {
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
      };

      lines.forEach(line => {
        if (/^\s*[-*]\s+/.test(line)) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push("<li>" + markdownInlineToHtml(line.replace(/^\s*[-*]\s+/, "")) + "</li>");
          return;
        }

        closeList();
        if (!normalizeText(line)) {
          html.push("<p><br></p>");
        } else if (line.startsWith("### ")) {
          html.push("<h3>" + markdownInlineToHtml(line.slice(4)) + "</h3>");
        } else if (line.startsWith("## ")) {
          html.push("<h2>" + markdownInlineToHtml(line.slice(3)) + "</h2>");
        } else if (line.startsWith("# ")) {
          html.push("<h2>" + markdownInlineToHtml(line.slice(2)) + "</h2>");
        } else {
          html.push("<p>" + markdownInlineToHtml(line) + "</p>");
        }
      });
      closeList();
      return html.join("");
    }

    function markdownInlineToHtml(value) {
      let html = escapeHtml(value);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return html;
    }

    function getMacroEditorMarkdown() {
      const shell = document.getElementById("macroWysiwygShell");
      const editor = document.getElementById("macroBodyEditor");
      const raw = document.getElementById("macroRawBody");
      if (!shell || !editor || !raw) {
        return "";
      }
      return normalizeText(shell.classList.contains("raw-mode") ? raw.value : editorHtmlToMarkdown(editor));
    }

    function editorHtmlToMarkdown(root) {
      const blocks = [];
      Array.from(root.childNodes).forEach(node => {
        const markdown = blockNodeToMarkdown(node);
        if (markdown !== null) {
          blocks.push(markdown);
        }
      });
      return blocks.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    function blockNodeToMarkdown(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return normalizeText(node.textContent);
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return null;
      }

      const name = node.nodeName.toLowerCase();
      if (name === "h1" || name === "h2") {
        return "## " + inlineNodesToMarkdown(node);
      }
      if (name === "h3") {
        return "### " + inlineNodesToMarkdown(node);
      }
      if (name === "ul") {
        return Array.from(node.children)
          .filter(child => child.nodeName.toLowerCase() === "li")
          .map(child => "- " + inlineNodesToMarkdown(child))
          .join("\n");
      }
      if (name === "ol") {
        return Array.from(node.children)
          .filter(child => child.nodeName.toLowerCase() === "li")
          .map((child, index) => (index + 1) + ". " + inlineNodesToMarkdown(child))
          .join("\n");
      }
      if (name === "div" || name === "p") {
        const text = inlineNodesToMarkdown(node);
        return text || "";
      }
      if (name === "br") {
        return "";
      }
      return inlineNodesToMarkdown(node);
    }

    function inlineNodesToMarkdown(node) {
      return Array.from(node.childNodes).map(inlineNodeToMarkdown).join("").replace(/\u00a0/g, " ").trim();
    }

    function inlineNodeToMarkdown(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent || "";
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const name = node.nodeName.toLowerCase();
      const text = inlineNodesToMarkdown(node);
      if (name === "strong" || name === "b") {
        return text ? "**" + text + "**" : "";
      }
      if (name === "em" || name === "i") {
        return text ? "*" + text + "*" : "";
      }
      if (name === "code") {
        return text ? "`" + text.replace(/`/g, "") + "`" : "";
      }
      if (name === "a") {
        const href = node.getAttribute("href") || "";
        return href ? "[" + text + "](" + href + ")" : text;
      }
      if (name === "br") {
        return "\n";
      }
      return text;
    }

    function setupMacroTagControls() {
      const input = document.getElementById("macroTagsInput");
      const search = document.getElementById("macroTagSearch");
      const suggestions = document.getElementById("macroTagSuggestions");
      const chips = document.getElementById("macroSelectedTags");
      if (!input || !search || !suggestions || !chips) {
        return;
      }

      const renderChips = () => {
        const tags = parseTagList(input.value);
        const knownTags = getKnownTags();
        chips.innerHTML = tags.map(tag => {
          const badgeClass = knownTags.has(tag) ? "ok" : "warn";
          return '<button class="chip-button ' + badgeClass + '" type="button" data-remove-tag="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '<span class="remove-mark">×</span></button>';
        }).join("");
        chips.querySelectorAll("[data-remove-tag]").forEach(button => {
          button.addEventListener("click", () => {
            const removeTag = button.getAttribute("data-remove-tag");
            input.value = parseTagList(input.value).filter(tag => tag !== removeTag).join(", ");
            renderChips();
          });
        });
      };

      const setTags = tags => {
        input.value = Array.from(new Set(tags.map(normalizeText).filter(Boolean))).join(", ");
        renderChips();
      };

      const addMacroTag = tag => {
        const normalizedTag = normalizeText(tag);
        if (!normalizedTag) {
          return;
        }
        const tags = parseTagList(input.value);
        if (!tags.includes(normalizedTag)) {
          tags.push(normalizedTag);
          setTags(tags);
        }
        search.value = "";
        suggestions.innerHTML = "";
      };

      const renderSuggestions = () => {
        const matches = getTagSuggestions(search.value, parseTagList(input.value));
        suggestions.innerHTML = matches.map((row, index) => [
          '<button class="suggestion-button' + (index === 0 ? " active" : "") + '" type="button" data-suggest-tag="' + escapeHtml(row.tag) + '">',
          '<span class="suggestion-main">' + escapeHtml(row.tag) + '</span>',
          '<span class="suggestion-meta">' + escapeHtml(row.field + " / " + row.category + " / " + row.ru_label) + '</span>',
          '</button>'
        ].join("")).join("");
        suggestions.querySelectorAll("[data-suggest-tag]").forEach(button => {
          button.addEventListener("click", () => {
            addMacroTag(button.getAttribute("data-suggest-tag"));
          });
        });
      };

      input.addEventListener("input", renderChips);
      search.addEventListener("input", () => {
        if (search.value.includes(",")) {
          const parts = search.value.split(",");
          const completeTags = parts.slice(0, -1).map(normalizeText).filter(Boolean);
          if (completeTags.length) {
            setTags(parseTagList(input.value).concat(completeTags));
          }
          search.value = parts[parts.length - 1].trim();
        }
        renderSuggestions();
      });
      search.addEventListener("keydown", event => {
        if (event.key !== "Enter" && event.key !== ",") {
          return;
        }
        const first = suggestions.querySelector("[data-suggest-tag]");
        const typedTag = normalizeText(search.value);
        if (!first && !typedTag) {
          return;
        }
        event.preventDefault();
        addMacroTag(first ? first.getAttribute("data-suggest-tag") : typedTag);
      });
      search.addEventListener("blur", () => {
        window.setTimeout(() => {
          suggestions.innerHTML = "";
        }, 150);
      });
      renderChips();
    }

    function getTagSuggestions(query, excludedTags) {
      const needle = normalizeText(query).toLowerCase();
      if (!needle) {
        return [];
      }
      const excluded = new Set((excludedTags || []).map(normalizeText).filter(Boolean));
      return state.rows
        .filter(row => {
          if (row.operator_selectable !== "yes" || excluded.has(row.tag)) {
            return false;
          }
          const haystack = [row.tag, row.ru_label, row.category, row.field].join(" ").toLowerCase();
          return haystack.includes(needle);
        })
        .sort((a, b) => {
          const aStarts = a.tag.toLowerCase().startsWith(needle) ? 0 : 1;
          const bStarts = b.tag.toLowerCase().startsWith(needle) ? 0 : 1;
          if (aStarts !== bStarts) {
            return aStarts - bStarts;
          }
          return a.tag.localeCompare(b.tag);
        })
        .slice(0, 12);
    }

    function createMacroCopy(source) {
      const macro = {
        id: makeMacroId(),
        title: makeCopiedMacroTitle(source.title),
        tags: source.tags.slice(),
        body: source.body
      };
      state.macros.push(macro);
      state.selectedMacroId = macro.id;
      state.editorMode = "macro";
      state.search = "";
      els.searchInput.value = "";
      render();
    }

    function makeCopiedMacroTitle(title) {
      const base = normalizeText(title) || "Макрос";
      const existing = new Set(state.macros.map(macro => macro.title));
      let index = 1;
      let candidate = base + " copy";
      while (existing.has(candidate)) {
        index += 1;
        candidate = base + " copy " + index;
      }
      return candidate;
    }

    function renderGroupEditor() {
      const group = splitGroupKey(state.selectedGroupKey);
      const rows = getGroupRows(state.selectedGroupKey);
      const active = rows.filter(row => row.operator_selectable === "yes").length;
      const archived = rows.length - active;
      els.editorTitle.textContent = "Группа";
      els.editorBody.innerHTML = [
        '<form id="groupForm" class="form">',
        renderFieldModeControl(group.field),
        '<div class="field"><label>Category</label><input name="category" value="' + escapeHtml(group.category) + '" required></div>',
        '<div class="message">Тегов: ' + rows.length + ', активных: ' + active + ', архивных: ' + archived + '.</div>',
        '<div class="actions">',
        '<button class="primary" type="submit">Сохранить группу</button>',
        '<button id="addTagFromGroup" type="button">+ Тег</button>',
        '</div>',
        '<div class="split-actions">',
        '<button id="archiveGroup" type="button">Архивировать группу</button>',
        '<button id="deleteGroup" class="danger" type="button">Удалить группу</button>',
        '</div>',
        '</form>'
      ].join("");

      setupFieldModeControl();

      document.getElementById("groupForm").addEventListener("submit", event => {
        event.preventDefault();
        const raw = Object.fromEntries(new FormData(event.currentTarget));
        const nextField = resolveFieldFromForm(raw);
        if (!nextField) {
          return;
        }
        const nextCategory = normalizeText(raw.category);
        if (!nextCategory) {
          alert("Category не может быть пустым.");
          return;
        }
        const current = splitGroupKey(state.selectedGroupKey);
        state.rows.forEach(row => {
          if (row.field === current.field && row.category === current.category) {
            row.field = nextField;
            row.category = nextCategory;
          }
        });
        state.selectedGroupKey = groupKey(nextField, nextCategory);
        state.editorMode = "group";
        render();
      });

      document.getElementById("addTagFromGroup").addEventListener("click", () => {
        state.selectedTagId = "";
        state.editorMode = "newTag";
        render();
      });

      document.getElementById("archiveGroup").addEventListener("click", () => {
        if (!confirm("Архивировать все теги группы " + group.category + "?")) {
          return;
        }
        rows.forEach(row => {
          row.operator_selectable = "no";
        });
        render();
      });

      document.getElementById("deleteGroup").addEventListener("click", () => {
        if (!confirm("Удалить группу " + group.category + " и все ее теги из taxonomy?")) {
          return;
        }
        state.rows = state.rows.filter(row => !(row.field === group.field && row.category === group.category));
        const firstGroup = getGroups()[0];
        state.selectedGroupKey = firstGroup ? firstGroup.key : "";
        state.selectedTagId = "";
        state.editorMode = state.selectedGroupKey ? "group" : "empty";
        render();
      });
    }

    function renderNewGroupEditor() {
      els.editorTitle.textContent = "Новая группа";
      els.editorBody.innerHTML = [
        '<form id="newGroupForm" class="form">',
        renderFieldModeControl("conversation"),
        '<div class="field"><label>Category</label><input name="category" placeholder="status" required></div>',
        '<div class="field"><label>Первый tag</label><input name="tag" placeholder="status.processing" required></div>',
        '<div class="field"><label>Русский label</label><input name="ru_label" placeholder="В обработке" required></div>',
        '<div class="field"><label>Usage</label><textarea name="usage" placeholder="Когда применять тег" required></textarea></div>',
        '<div class="field"><label>Operator selectable</label><select name="operator_selectable"><option value="yes">yes</option><option value="no">no</option></select></div>',
        '<div class="actions"><button class="primary" type="submit">Создать группу</button></div>',
        '</form>'
      ].join("");

      setupFieldModeControl();

      document.getElementById("newGroupForm").addEventListener("submit", event => {
        event.preventDefault();
        const raw = Object.fromEntries(new FormData(event.currentTarget));
        const field = resolveFieldFromForm(raw);
        if (!field) {
          return;
        }
        const form = {
          field,
          tag: raw.tag,
          category: raw.category,
          ru_label: raw.ru_label,
          usage: raw.usage,
          operator_selectable: raw.operator_selectable
        };
        const row = makeRow(form);
        state.rows.push(row);
        state.selectedGroupKey = groupKey(row.field, row.category);
        state.selectedTagId = row.id;
        state.editorMode = "tag";
        render();
      });
    }

    function renderTagEditor(row) {
      const group = splitGroupKey(state.selectedGroupKey);
      const isNew = !row;
      const data = row || {
        field: group.field || "conversation",
        tag: "",
        category: group.category || "",
        ru_label: "",
        usage: "",
        operator_selectable: "yes"
      };
      const fieldControl = isNew
        ? '<input name="field" value="' + escapeHtml(data.field) + '" readonly>'
        : '<select name="field">' + renderFieldOptions(data.field) + '</select>';
      const categoryReadonly = isNew ? " readonly" : "";

      els.editorTitle.textContent = isNew ? "Новый тег" : "Тег";
      els.editorBody.innerHTML = [
        '<form id="tagForm" class="form">',
        '<div class="field"><label>Field</label>' + fieldControl + '</div>',
        '<div class="field"><label>Tag</label><input id="tagInput" name="tag" value="' + escapeHtml(data.tag) + '" placeholder="issue.payment_failed" required></div>',
        '<div class="field"><label>Category</label><input name="category" value="' + escapeHtml(data.category) + '"' + categoryReadonly + ' required></div>',
        '<div class="field"><label>Русский label</label><input name="ru_label" value="' + escapeHtml(data.ru_label) + '" required></div>',
        '<div class="field"><label>Usage</label><textarea name="usage" required>' + escapeHtml(data.usage) + '</textarea></div>',
        '<div class="field"><label>Operator selectable</label><select name="operator_selectable">',
        '<option value="yes"' + selected(data.operator_selectable, "yes") + '>yes</option>',
        '<option value="no"' + selected(data.operator_selectable, "no") + '>no</option>',
        '</select></div>',
        '<div class="actions"><button class="primary" type="submit">' + (isNew ? "Создать тег" : "Сохранить тег") + '</button></div>',
        isNew ? "" : [
          '<div class="split-actions tag-actions">',
          '<button id="copyTag" class="copy-tag-button" type="button" title="Создать копию этого тега в той же группе">Копировать тег</button>',
          '<button id="archiveTag" type="button">' + (data.operator_selectable === "yes" ? "Архивировать" : "Вернуть активным") + '</button>',
          '<button id="deleteTag" class="danger" type="button">Удалить тег</button>',
          '</div>'
        ].join(""),
        '</form>'
      ].join("");

      document.getElementById("tagForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = Object.fromEntries(new FormData(event.currentTarget));
        if (!row && state.selectedGroupKey) {
          const currentGroup = splitGroupKey(state.selectedGroupKey);
          form.field = currentGroup.field;
          form.category = currentGroup.category;
        }
        const next = makeRow(form, row ? row.id : null);
        if (row) {
          Object.assign(row, next);
        } else {
          state.rows.push(next);
          state.selectedTagId = next.id;
          state.search = "";
          els.searchInput.value = "";
        }
        state.selectedGroupKey = groupKey(next.field, next.category);
        state.editorMode = "tag";
        render();
      });

      const copyButton = document.getElementById("copyTag");
      if (copyButton && row) {
        copyButton.addEventListener("click", () => {
          createTagCopy(row);
        });
      }

      const archiveButton = document.getElementById("archiveTag");
      if (archiveButton && row) {
        archiveButton.addEventListener("click", () => {
          row.operator_selectable = row.operator_selectable === "yes" ? "no" : "yes";
          render();
        });
      }

      const deleteButton = document.getElementById("deleteTag");
      if (deleteButton && row) {
        deleteButton.addEventListener("click", () => {
          if (!confirm("Удалить тег " + row.tag + " из taxonomy?")) {
            return;
          }
          state.rows = state.rows.filter(item => item.id !== row.id);
          if (!getGroupRows(state.selectedGroupKey).length) {
            const firstGroup = getGroups()[0];
            state.selectedGroupKey = firstGroup ? firstGroup.key : "";
          }
          state.selectedTagId = "";
          state.editorMode = state.selectedGroupKey ? "group" : "empty";
          render();
        });
      }
    }

    function selected(actual, expected) {
      return actual === expected ? " selected" : "";
    }

    function makeRow(form, id) {
      return {
        id: id || makeId(),
        field: normalizeText(form.field),
        tag: normalizeText(form.tag),
        category: normalizeText(form.category),
        ru_label: normalizeText(form.ru_label),
        usage: normalizeText(form.usage),
        operator_selectable: normalizeText(form.operator_selectable || "yes")
      };
    }

    function exportTaxonomy() {
      const validation = validateRows();
      if (validation.errors.length) {
        alert("Экспорт заблокирован: исправьте ошибки валидации.");
        return;
      }
      downloadCsv("helpdesk_tag_taxonomy.csv", state.rows, HEADERS);
    }

    function exportUserImport() {
      const rows = state.rows
        .filter(row => row.field === "user" && row.operator_selectable === "yes")
        .map(row => pick(row, IMPORT_HEADERS));
      downloadCsv("helpdesk_user_tags_import.csv", rows, IMPORT_HEADERS);
    }

    function exportConversationImport() {
      const rows = state.rows
        .filter(row => row.field === "conversation" && row.operator_selectable === "yes")
        .map(row => pick(row, IMPORT_HEADERS));
      downloadCsv("helpdesk_conversation_tags_import.csv", rows, IMPORT_HEADERS);
    }

    function serializeTagImportList(rows) {
      const tags = Array.from(new Set(rows
        .filter(row => row.operator_selectable === "yes")
        .map(row => normalizeText(row.tag))
        .filter(Boolean)))
        .sort((a, b) => a.localeCompare(b));
      return "\uFEFF" + tags.join("\r\n") + "\r\n";
    }

    function exportTagImportCsv() {
      const validation = validateRows();
      if (validation.errors.length) {
        alert("Экспорт заблокирован: исправьте ошибки валидации.");
        return;
      }
      const text = serializeTagImportList(state.rows);
      if (!text.trim()) {
        alert("Нет активных тегов для экспорта.");
        return;
      }
      downloadText("helpdesk_tags_import.csv", text, "text/csv;charset=utf-8");
    }

    function pick(row, headers) {
      const result = {};
      headers.forEach(header => {
        result[header] = row[header];
      });
      return result;
    }

    function exportAll() {
      const validation = validateRows();
      if (validation.errors.length) {
        alert("Экспорт заблокирован: исправьте ошибки валидации.");
        return;
      }
      exportTaxonomy();
      exportUserImport();
      exportConversationImport();
    }

    function exportMacros() {
      const validation = validateMacros();
      if (validation.errors.length) {
        alert("Экспорт макросов заблокирован: исправьте ошибки валидации.");
        return;
      }
      downloadText("macros_markdown.txt", serializeMacrosMarkdown(state.macros), "text/plain;charset=utf-8");
    }

    function saveAndDownload() {
      if (state.mode === "macros") {
        exportMacros();
        return;
      }
      exportTaxonomy();
    }

    async function loadLocalTaxonomyIfAvailable() {
      try {
        const response = await fetch("helpdesk_tag_taxonomy.csv", { cache: "no-store" });
        if (!response.ok) {
          return;
        }
        const text = await response.text();
        const rows = parseCsv(text);
        importRows(rows, "helpdesk_tag_taxonomy.csv");
      } catch (error) {
        render();
      }
    }

    async function loadLocalMacrosIfAvailable() {
      try {
        const response = await fetch("macros_markdown.txt", { cache: "no-store" });
        if (!response.ok) {
          return;
        }
        const text = await response.text();
        state.macros = parseMacrosMarkdown(text);
        state.macroFileName = "macros_markdown.txt";
        render();
      } catch (error) {
        render();
      }
    }

    function readFileAsText(file) {
      if (file.text) {
        return file.text();
      }
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Не удалось прочитать файл."));
        reader.readAsText(file, "utf-8");
      });
    }

    els.importButton.addEventListener("click", () => {
      els.fileInput.click();
    });

    els.fileInput.addEventListener("change", async event => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }
      try {
        const text = await readFileAsText(file);
        if (state.mode === "macros") {
          importMacros(parseMacrosMarkdown(text), file.name);
        } else {
          importRows(parseCsv(text), file.name);
        }
      } catch (error) {
        alert("Не удалось импортировать файл: " + error.message);
      } finally {
        event.target.value = "";
      }
    });

    els.searchInput.addEventListener("input", event => {
      state.search = event.target.value.trim();
      render();
    });

    els.newGroupButton.addEventListener("click", () => {
      if (state.mode !== "tags") {
        return;
      }
      state.selectedTagId = "";
      state.selectedMacroId = "";
      state.editorMode = "newGroup";
      render();
    });

    els.newTagButton.addEventListener("click", () => {
      if (state.mode === "macros") {
        state.selectedMacroId = "";
        state.editorMode = "newMacro";
      } else {
        state.selectedTagId = "";
        state.selectedMacroId = "";
        state.editorMode = "newTag";
      }
      render();
    });

    els.clearSelectionButton.addEventListener("click", () => {
      state.selectedTagId = "";
      state.selectedMacroId = "";
      state.editorMode = state.selectedGroupKey ? "group" : "empty";
      render();
    });

    els.modeTagsButton.addEventListener("click", () => {
      state.mode = "tags";
      state.selectedMacroId = "";
      state.editorMode = state.selectedTagId ? "tag" : (state.selectedGroupKey ? "group" : "empty");
      render();
    });

    els.modeMacrosButton.addEventListener("click", () => {
      state.mode = "macros";
      state.selectedTagId = "";
      state.selectedMacroId = "";
      state.editorMode = state.selectedGroupKey ? "group" : "empty";
      render();
    });

    els.saveDownloadButton.addEventListener("click", saveAndDownload);
    els.exportTagImportButton.addEventListener("click", exportTagImportCsv);

    render();
    loadLocalTaxonomyIfAvailable();
    loadLocalMacrosIfAvailable();
  </script>
</body>
</html>
