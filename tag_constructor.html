<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Конструктор тегов</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --panel-soft: #f9fbfb;
      --border: #d9e1e3;
      --border-strong: #aab7bb;
      --text: #172126;
      --muted: #637178;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --accent-soft: #e3f5f2;
      --danger: #b42318;
      --danger-soft: #fde8e5;
      --warning: #a15c07;
      --warning-soft: #fff1d6;
      --ok: #247346;
      --ok-soft: #e2f4e8;
      --shadow: 0 10px 30px rgba(23, 33, 38, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      min-height: 36px;
      padding: 8px 12px;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      border-color: var(--border-strong);
      background: var(--panel-soft);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    .mode-button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .button-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .danger {
      border-color: #efb5ae;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .ghost {
      background: transparent;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100%;
    }

    .topbar {
      display: grid;
      gap: 10px;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.94);
      position: sticky;
      top: 0;
      z-index: 4;
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .brand strong {
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .search {
      width: 100%;
      min-width: 220px;
      position: relative;
    }

    .search input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      background: var(--panel);
      color: var(--text);
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(230px, 300px) minmax(360px, 1fr) minmax(300px, 380px);
      gap: 14px;
      min-height: 0;
      padding: 14px;
    }

    .shell.macro-mode {
      grid-template-columns: minmax(230px, 300px) minmax(440px, 1fr) minmax(520px, 50vw);
    }

    .shell.conditions-mode {
      grid-template-columns: minmax(230px, 300px) minmax(360px, 0.9fr) minmax(520px, 1.1fr);
    }

    .pane {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-soft);
    }

    .pane-header h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .pane-body {
      height: calc(100vh - 128px);
      min-height: 420px;
      overflow: auto;
      padding: 12px;
    }

    .groups {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .group-section-title {
      margin: 4px 2px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .group-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .group-button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      text-align: left;
    }

    .group-button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .group-button.no-macros {
      border-style: dashed;
      opacity: 0.76;
    }

    .group-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 700;
    }



    .count-pill {
      align-self: center;
      border-radius: 999px;
      background: #eef2f2;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      display: grid;
      gap: 2px;
      min-width: 110px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      background: var(--panel-soft);
    }

    .stat strong {
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .message {
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: var(--panel-soft);
      color: var(--muted);
    }

    .message.error {
      border-color: #f4b8b2;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .message.warning {
      border-color: #ffd58f;
      background: var(--warning-soft);
      color: var(--warning);
    }

    .tag-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .condition-field-list {
      display: grid;
      gap: 10px;
    }

    .condition-option-toolbar {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr auto auto;
      align-items: center;
    }

    .condition-mode-control {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .condition-mode-control label,
    .condition-option {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      padding: 9px 10px;
    }

    .condition-option {
      cursor: pointer;
    }

    .condition-option input {
      margin-top: 3px;
    }

    .condition-option-list {
      display: grid;
      gap: 8px;
      max-height: 48vh;
      overflow: auto;
      padding-right: 2px;
    }

    .condition-option-code {
      display: block;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .condition-option-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .macro-list {
      display: block;
      min-width: 0;
    }

    .macro-browser {
      display: grid;
      gap: 14px;
    }

    .macro-tag-filters {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 8px;
    }

    .tag-card {
      display: grid;
      gap: 8px;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 11px;
      background: var(--panel);
      text-align: left;
      cursor: pointer;
    }

    .tag-card:hover {
      border-color: var(--border-strong);
      background: var(--panel-soft);
    }

    .tag-card:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .tag-card.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .tag-card.archived {
      border-style: dashed;
      opacity: 0.72;
    }

    .tag-card.no-macros {
      border-style: dashed;
      background: #fff8eb;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .macro-card {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
      height: 230px;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 11px;
      background: var(--panel);
      text-align: left;
      cursor: pointer;
      overflow: hidden;
    }

    .macro-card:hover {
      border-color: var(--border-strong);
      background: var(--panel-soft);
    }

    .macro-card.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .macro-title {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 800;
    }

    .macro-tags,
    .macro-tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .tag-combobox {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      padding: 6px;
    }

    .tag-combobox:focus-within {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .tag-combobox .macro-tag-chips {
      display: contents;
    }

    .field .tag-combobox input {
      flex: 1 1 180px;
      min-width: 160px;
      min-height: 28px;
      border: 0;
      outline: 0;
      padding: 3px 4px;
      background: transparent;
    }

    .macro-preview {
      min-height: 0;
      color: var(--muted);
      overflow: hidden;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
    }

    .chip-button {
      border-radius: 999px;
      min-height: 26px;
      padding: 3px 9px;
      color: var(--accent-strong);
      border-color: #b8deda;
      background: #f1fbf9;
      font-size: 12px;
      font-weight: 700;
    }

    .chip-button .remove-mark {
      margin-left: 5px;
      color: var(--danger);
    }

    .chip-button.warn {
      color: var(--warning);
      border-color: #ffd58f;
      background: var(--warning-soft);
    }

    .autocomplete {
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 8;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .suggestions:empty {
      display: none;
    }

    .suggestion-button {
      display: grid;
      gap: 2px;
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 0;
      padding: 8px 10px;
      text-align: left;
      background: var(--panel);
    }

    .suggestion-button:hover,
    .suggestion-button.active {
      background: var(--accent-soft);
    }

    .suggestion-main {
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 800;
    }

    .suggestion-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .wysiwyg-shell {
      display: grid;
      gap: 8px;
    }

    .wysiwyg-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px;
      background: var(--panel-soft);
    }

    .wysiwyg-toolbar button {
      min-height: 30px;
      padding: 4px 9px;
      font-weight: 700;
    }

    .wysiwyg-editor,
    .raw-markdown {
      width: 100%;
      min-height: 360px;
      max-height: calc(100vh - 420px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      padding: 12px;
    }

    .wysiwyg-editor:focus,
    .raw-markdown:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .wysiwyg-editor p,
    .wysiwyg-editor h1,
    .wysiwyg-editor h2,
    .wysiwyg-editor h3,
    .wysiwyg-editor ul {
      margin: 0 0 10px;
    }

    .wysiwyg-editor code {
      border-radius: 4px;
      background: #eef2f2;
      padding: 1px 4px;
      font-family: "Cascadia Mono", Consolas, monospace;
    }

    .raw-markdown {
      display: none;
      resize: vertical;
      font-family: "Cascadia Mono", Consolas, monospace;
      white-space: pre-wrap;
    }

    .raw-mode .wysiwyg-editor {
      display: none;
    }

    .raw-mode .raw-markdown {
      display: block;
    }

    .tag-top {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
    }

    .tag-code {
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .copy-tag-button {
      color: var(--accent);
      border-color: #b8deda;
      background: #f1fbf9;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      background: #edf1f1;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.ok {
      background: var(--ok-soft);
      color: var(--ok);
    }

    .badge.warn {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .badge.error {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .tag-label {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .tag-usage {
      color: var(--muted);
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 10px;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .search input:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.15);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .split-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tag-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px dashed var(--border-strong);
      border-radius: 7px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .validation-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding-left: 18px;
    }

    .hidden-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 1120px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .shell {
        grid-template-columns: minmax(220px, 280px) minmax(360px, 1fr);
      }

      .shell.macro-mode {
        grid-template-columns: minmax(220px, 280px) minmax(360px, 1fr);
      }

      .editor-pane {
        grid-column: 1 / -1;
      }

      .pane-body {
        height: auto;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .shell {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .shell.macro-mode {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 12px;
      }

      .toolbar button,
      .toolbar label,
      .actions button,
      .split-actions button {
        width: 100%;
      }

      .split-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <strong>Конструктор тегов</strong>
        <span id="fileStatus">CSV не загружен</span>
      </div>
      <div class="search">
        <input id="searchInput" type="search" placeholder="Поиск по tag, label, usage или category" autocomplete="off">
      </div>
      <div class="toolbar">
        <input id="fileInput" class="hidden-input" type="file" accept=".csv,text/csv,text/plain,application/csv,application/vnd.ms-excel,application/octet-stream">
        <button id="importButton" type="button">Импорт</button>
        <button id="modeTagsButton" class="mode-button active" type="button">Tags</button>
        <button id="modeMacrosButton" class="mode-button" type="button">Macros</button>
        <button id="modeConditionsButton" class="mode-button" type="button">CvDA Conditions</button>
        <button id="exportTagImportButton" type="button">Экспорт</button>
        <button id="saveDownloadButton" class="primary" type="button">Save and Download</button>
      </div>
    </header>

    <main id="shell" class="shell">
      <section class="pane">
        <div class="pane-header">
          <h2>Группы</h2>
          <button id="newGroupButton" type="button">+ Группа</button>
        </div>
        <div class="pane-body">
          <div id="groupList" class="groups"></div>
        </div>
      </section>

      <section class="pane">
        <div class="pane-header">
          <h2 id="tagPaneTitle">Теги</h2>
          <button id="newTagButton" type="button" disabled>+ Тег</button>
        </div>
        <div class="pane-body">
          <div id="stats" class="stats"></div>
          <div id="validationBox"></div>
          <div id="tagList" class="tag-grid"></div>
        </div>
      </section>

      <section class="pane editor-pane">
        <div class="pane-header">
          <h2 id="editorTitle">Редактор</h2>
          <button id="clearSelectionButton" class="ghost" type="button">Сброс</button>
        </div>
        <div id="editorBody" class="pane-body"></div>
      </section>
    </main>
  </div>

  <script>
    const HEADERS = ["field_name", "tag"];
    const CVDA_ID_HEADERS = ["descriptor_id", "field_name", "option_id", "tag"];
    const CONDITION_HEADERS = ["If option is", "Then show", "With these options"];
    const CONDITION_ID_HEADERS = ["condition_id", "controlling_descriptor_id", "if_option_id", "If option is", "dependent_descriptor_id", "Then show", "dependent_option_id", "With these options"];
    const LEGACY_HEADERS = ["field", "tag", "category", "ru_label", "usage", "operator_selectable"];
    const IMPORT_HEADERS = ["field_name", "tag"];
    const NEW_ID = "new";
    const CORE_FIELDS = ["user", "conversation"];
    const VALID_SELECTABLE = new Set(["yes", "no"]);
    const FIELD_PATTERN = /^[a-z][a-z0-9_]*$/;
    const TAG_PATTERN = /^[a-z0-9_]+(\.[a-z0-9_]+)+$/;

    const state = {
      mode: "tags",
      rows: [],
      macros: [],
      conditionsRows: [],
      selectedGroupKey: "",
      selectedTagId: "",
      selectedMacroId: "",
      selectedConditionRoot: "",
      selectedConditionTag: "",
      editorMode: "empty",
      search: "",
      fileName: "",
      macroFileName: "",
      conditionsFileName: "",
      newConditionRows: [],
      nextId: 1,
      nextMacroId: 1,
      nextConditionId: 1
    };

    const els = {
      fileStatus: document.getElementById("fileStatus"),
      fileInput: document.getElementById("fileInput"),
      importButton: document.getElementById("importButton"),
      modeTagsButton: document.getElementById("modeTagsButton"),
      modeMacrosButton: document.getElementById("modeMacrosButton"),
      modeConditionsButton: document.getElementById("modeConditionsButton"),
      exportTagImportButton: document.getElementById("exportTagImportButton"),
      saveDownloadButton: document.getElementById("saveDownloadButton"),
      shell: document.getElementById("shell"),
      searchInput: document.getElementById("searchInput"),
      groupList: document.getElementById("groupList"),
      tagList: document.getElementById("tagList"),
      tagPaneTitle: document.getElementById("tagPaneTitle"),
      newTagButton: document.getElementById("newTagButton"),
      newGroupButton: document.getElementById("newGroupButton"),
      stats: document.getElementById("stats"),
      validationBox: document.getElementById("validationBox"),
      editorTitle: document.getElementById("editorTitle"),
      editorBody: document.getElementById("editorBody"),
      clearSelectionButton: document.getElementById("clearSelectionButton")
    };

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function makeId() {
      const id = "tag-" + state.nextId;
      state.nextId += 1;
      return id;
    }

    function makeMacroId() {
      const id = "macro-" + state.nextMacroId;
      state.nextMacroId += 1;
      return id;
    }

    function makeConditionId() {
      const id = "condition-" + state.nextConditionId;
      state.nextConditionId += 1;
      return id;
    }

    function groupKey(field, category) {
      return field + "::" + category;
    }

    function splitGroupKey(key) {
      const index = key.indexOf("::");
      if (index === -1) {
        return { field: "", category: "" };
      }
      return {
        field: key.slice(0, index),
        category: key.slice(index + 2)
      };
    }

    function getGroupRows(key) {
      const group = splitGroupKey(key);
      return state.rows.filter(row => row.field === group.field && row.category === group.category);
    }

    function getGroupDescriptorId(key) {
      const row = getGroupRows(key).find(item => normalizeId(item.descriptor_id));
      return row ? normalizeId(row.descriptor_id) : "";
    }

    function getSelectedTag() {
      return state.rows.find(row => row.id === state.selectedTagId) || null;
    }

    function getSelectedMacro() {
      return state.macros.find(macro => macro.id === state.selectedMacroId) || null;
    }

    function getSelectedConditionRootLabel() {
      const rootTag = normalizeText(state.selectedConditionRoot);
      if (!rootTag) {
        return "";
      }
      const taxonomyRow = state.rows.find(row => row.tag === rootTag);
      if (taxonomyRow) {
        return composeDisplayTag(rootTag, taxonomyRow.ru_label);
      }
      const conditionRow = state.conditionsRows.find(row => row.rootTag === rootTag);
      return conditionRow ? conditionRow.ifOptionIs : rootTag;
    }

    function getTagParts(tagValue) {
      const raw = normalizeText(tagValue);
      if (!raw) {
        return { raw: "", code: "", label: "" };
      }
      const normalizedMatch = raw.match(/^(.+?)\s+[—-]\s+(.+)$/);
      if (normalizedMatch) {
        return {
          raw,
          code: normalizeText(normalizedMatch[1]),
          label: normalizeText(normalizedMatch[2])
        };
      }
      const match = raw.match(/^(.+?)\s+[—-]\s+(.+)$/);
      if (!match) {
        return { raw, code: raw, label: "" };
      }
      return {
        raw,
        code: normalizeText(match[1]),
        label: normalizeText(match[2])
      };
    }

    function getRowTagCode(row) {
      if (!row) {
        return "";
      }
      if (row.tag_code) {
        return normalizeText(row.tag_code);
      }
      const raw = normalizeText(row.tag_display || row.tag);
      const match = raw.match(/^(.+?)\s+[—-]\s+(.+)$/);
      return normalizeText(match ? match[1] : raw);
    }

    function getKnownTags() {
      return new Set(state.rows.map(getRowTagCode).filter(Boolean));
    }

    function inferFieldFromTag(tag) {
      const code = normalizeText(tag);
      return code.startsWith("user.") ? "user" : "conversation";
    }

    function composeDisplayTag(tag, label) {
      const code = normalizeText(tag);
      const text = normalizeText(label);
      return text ? code + " — " + text : code;
    }

    function getRowDisplayTag(row) {
      if (!row) {
        return "";
      }
      return normalizeText(row.tag_display || composeDisplayTag(row.tag, row.ru_label));
    }

    function buildLegacyFieldName(row) {
      if (normalizeText(row.field_name)) {
        return normalizeText(row.field_name);
      }
      if (normalizeText(row.category)) {
        return normalizeText(row.category);
      }
      if (normalizeText(row.field)) {
        return normalizeText(row.field);
      }
      return "group";
    }

    function cleanConditionFieldName(value) {
      return normalizeText(value).replace(/^\s*\d+\.\s*/, "").trim();
    }

    function normalizeId(value) {
      return String(value || "").trim();
    }

    function isNewId(value) {
      return normalizeId(value).toLowerCase() === NEW_ID;
    }

    function extractTagCode(value) {
      const raw = normalizeText(value);
      if (!raw) {
        return "";
      }
      const match = raw.match(/^(.+?)\s+[—-]\s+(.+)$/);
      return normalizeText(match ? match[1] : raw);
    }

    function parseTagList(value) {
      return Array.from(new Set(String(value || "")
        .split(",")
        .map(normalizeText)
        .filter(Boolean)));
    }

    function parseDelimitedCsv(text, delimiter) {
      const input = String(text || "").replace(/^\uFEFF/, "");
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < input.length; i += 1) {
        const char = input[i];
        const next = input[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            value += '"';
            i += 1;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            value += char;
          }
          continue;
        }

        if (char === '"') {
          inQuotes = true;
        } else if (char === delimiter) {
          row.push(value);
          value = "";
        } else if (char === "\n") {
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else if (char !== "\r") {
          value += char;
        }
      }

      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows.filter(items => items.some(item => normalizeText(item)));
    }

    function parseTagCsv(text) {
      const commaRows = parseDelimitedCsv(text, ",");
      if (commaRows.length) {
        const commaHeaders = commaRows[0].map(normalizeText);
        if (CVDA_ID_HEADERS.every(header => commaHeaders.includes(header))) {
          const descriptorIndex = commaHeaders.indexOf("descriptor_id");
          const fieldIndex = commaHeaders.indexOf("field_name");
          const optionIndex = commaHeaders.indexOf("option_id");
          const tagIndex = commaHeaders.indexOf("tag");
          let currentDescriptorId = "";
          let currentFieldName = "";
          return commaRows.slice(1).map(items => {
            const descriptorId = normalizeId(items[descriptorIndex]) || currentDescriptorId;
            const fieldName = normalizeText(items[fieldIndex]) || currentFieldName;
            const optionId = normalizeId(items[optionIndex]);
            const displayTag = normalizeText(items[tagIndex]);
            const parts = getTagParts(displayTag);
            currentDescriptorId = descriptorId;
            currentFieldName = fieldName;
            return {
              id: makeId(),
              descriptor_id: descriptorId,
              option_id: optionId,
              field_name: fieldName,
              field: inferFieldFromTag(parts.code),
              category: fieldName,
              tag: parts.code,
              tag_code: parts.code,
              tag_display: displayTag || parts.code,
              ru_label: parts.label,
              usage: "",
              operator_selectable: "yes"
            };
          }).filter(row => row.field_name && row.tag);
        }

        if (HEADERS.every(header => commaHeaders.includes(header))) {
          const fieldIndex = commaHeaders.indexOf("field_name");
          const tagIndex = commaHeaders.indexOf("tag");
          let currentFieldName = "";
          return commaRows.slice(1).map(items => {
            const fieldName = normalizeText(items[fieldIndex]) || currentFieldName;
            const displayTag = normalizeText(items[tagIndex]);
            const parts = getTagParts(displayTag);
            currentFieldName = fieldName;
            return {
              id: makeId(),
              descriptor_id: "",
              option_id: "",
              field_name: fieldName,
              field: inferFieldFromTag(parts.code),
              category: fieldName,
              tag: parts.code,
              tag_code: parts.code,
              tag_display: displayTag || parts.code,
              ru_label: parts.label,
              usage: "",
              operator_selectable: "yes"
            };
          }).filter(row => row.field_name && row.tag);
        }
      }

      const legacyRows = parseDelimitedCsv(text, ";");
      if (!legacyRows.length) {
        return [];
      }

      const legacyHeaders = legacyRows[0].map(normalizeText);
      const missing = LEGACY_HEADERS.filter(header => !legacyHeaders.includes(header));
      if (missing.length) {
        throw new Error("В CSV нет колонок: field_name, tag");
      }

      return legacyRows.slice(1).map(items => {
        const rowObject = { id: makeId() };
        legacyHeaders.forEach((header, index) => {
          rowObject[header] = normalizeText(items[index]);
        });
        const code = extractTagCode(rowObject.tag);
        const label = normalizeText(rowObject.ru_label);
        const fieldName = buildLegacyFieldName(rowObject);
        return {
          id: rowObject.id,
          descriptor_id: normalizeId(rowObject.descriptor_id),
          option_id: normalizeId(rowObject.option_id),
          field_name: fieldName,
          field: normalizeText(rowObject.field) || inferFieldFromTag(code),
          category: fieldName,
          tag: code,
          tag_code: code,
          tag_display: composeDisplayTag(code, label),
          ru_label: label,
          usage: normalizeText(rowObject.usage),
          operator_selectable: normalizeText(rowObject.operator_selectable || "yes")
        };
      }).filter(row => row.field_name && row.tag);
    }

    function parseCsv(text) {
      const nonEmptyRows = parseDelimitedCsv(text, ";");
      if (!nonEmptyRows.length) {
        return [];
      }

      const headers = nonEmptyRows[0].map(normalizeText);
      const missing = HEADERS.filter(header => !headers.includes(header));
      if (missing.length) {
        throw new Error("В CSV нет колонок: " + missing.join(", "));
      }

      return nonEmptyRows.slice(1).map(items => {
        const rowObject = { id: makeId() };
        headers.forEach((header, index) => {
          rowObject[header] = normalizeText(items[index]);
        });
        HEADERS.forEach(header => {
          if (!(header in rowObject)) {
            rowObject[header] = "";
          }
        });
        return rowObject;
      });
    }

    function buildOptionLabel(tag, label) {
      const cleanTag = normalizeText(tag);
      const cleanLabel = normalizeText(label);
      return cleanLabel ? cleanTag + " — " + cleanLabel : cleanTag;
    }

    function parseOptionTag(value) {
      const normalized = normalizeText(value);
      if (!normalized) {
        return "";
      }
      const match = normalized.match(/^(.+?)\s+[—-]\s+(.+)$/);
      return normalizeText(match ? match[1] : normalized);
    }

    function parseConditionsCsv(text) {
      const nonEmptyRows = parseDelimitedCsv(text, ",");
      if (!nonEmptyRows.length) {
        return [];
      }

      const headers = nonEmptyRows[0].map(normalizeText);
      const hasIdHeaders = CONDITION_ID_HEADERS.every(header => headers.includes(header));
      if (hasIdHeaders) {
        const conditionIndex = headers.indexOf("condition_id");
        const controllingDescriptorIndex = headers.indexOf("controlling_descriptor_id");
        const ifOptionIndex = headers.indexOf("if_option_id");
        const ifIndex = headers.indexOf("If option is");
        const dependentDescriptorIndex = headers.indexOf("dependent_descriptor_id");
        const thenIndex = headers.indexOf("Then show");
        const dependentOptionIndex = headers.indexOf("dependent_option_id");
        const withIndex = headers.indexOf("With these options");
        let current = null;

        return nonEmptyRows.slice(1).map(items => {
          const conditionId = normalizeId(items[conditionIndex]);
          const controllingDescriptorId = normalizeId(items[controllingDescriptorIndex]);
          const ifOptionId = normalizeId(items[ifOptionIndex]);
          const ifOptionIs = normalizeText(items[ifIndex]);
          const dependentDescriptorId = normalizeId(items[dependentDescriptorIndex]);
          const thenShow = cleanConditionFieldName(items[thenIndex]);
          const dependentOptionId = normalizeId(items[dependentOptionIndex]);
          const withTheseOptions = normalizeText(items[withIndex]);
          if (conditionId || controllingDescriptorId || ifOptionId || ifOptionIs || dependentDescriptorId || thenShow) {
            current = {
              condition_id: conditionId || NEW_ID,
              controlling_descriptor_id: controllingDescriptorId,
              if_option_id: ifOptionId,
              ifOptionIs,
              dependent_descriptor_id: dependentDescriptorId,
              thenShow
            };
          }
          if (!current) {
            return null;
          }
          const finalDependentOptionId = dependentOptionId || (!withTheseOptions ? "*" : "");
          return {
            id: makeConditionId(),
            condition_id: current.condition_id,
            controlling_descriptor_id: current.controlling_descriptor_id,
            if_option_id: current.if_option_id,
            ifOptionIs: current.ifOptionIs,
            dependent_descriptor_id: current.dependent_descriptor_id,
            thenShow: current.thenShow,
            dependent_option_id: finalDependentOptionId,
            withTheseOptions,
            rootTag: extractTagCode(current.ifOptionIs),
            childTag: finalDependentOptionId === "*" ? "" : extractTagCode(withTheseOptions)
          };
        }).filter(Boolean).filter(row => row.ifOptionIs || row.thenShow || row.withTheseOptions || row.dependent_option_id);
      }

      const missing = CONDITION_HEADERS.filter(header => !headers.includes(header));
      if (missing.length) {
        throw new Error("В conditions CSV нет колонок: " + missing.join(", "));
      }

      const ifIndex = headers.indexOf("If option is");
      const thenIndex = headers.indexOf("Then show");
      const withIndex = headers.indexOf("With these options");
      let currentIf = "";
      let currentThen = "";

      return nonEmptyRows.slice(1).map(items => {
        const ifOptionIs = normalizeText(items[ifIndex]);
        const thenShow = cleanConditionFieldName(items[thenIndex]);
        const withTheseOptions = normalizeText(items[withIndex]);
        if (ifOptionIs) {
          currentIf = ifOptionIs;
        }
        if (thenShow) {
          currentThen = thenShow;
        }
        return {
          id: makeConditionId(),
          condition_id: "",
          controlling_descriptor_id: "",
          if_option_id: "",
          ifOptionIs: currentIf,
          dependent_descriptor_id: "",
          thenShow: currentThen,
          dependent_option_id: withTheseOptions ? "" : "*",
          withTheseOptions,
          rootTag: extractTagCode(currentIf),
          childTag: extractTagCode(withTheseOptions)
        };
      }).filter(row => row.ifOptionIs || row.thenShow || row.withTheseOptions);
    }

    function csvValue(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function serializeCsv(rows, headers) {
      const lines = [
        headers.map(csvValue).join(";"),
        ...rows.map(row => headers.map(header => csvValue(row[header])).join(";"))
      ];
      return "\uFEFF" + lines.join("\r\n") + "\r\n";
    }

    function serializeTagRowsCsv(rows) {
      const sortedRows = (rows || [])
        .slice()
        .sort((a, b) => {
          const leftGroup = normalizeText(a.field_name).localeCompare(normalizeText(b.field_name), "ru");
          if (leftGroup !== 0) {
            return leftGroup;
          }
          return getRowDisplayTag(a).localeCompare(getRowDisplayTag(b), "ru");
        });

      let previousFieldName = "";
      let previousDescriptorId = "";
      const lines = [
        CVDA_ID_HEADERS.map(csvValue).join(","),
        ...sortedRows.map(row => {
          const fieldName = normalizeText(row.field_name);
          const descriptorId = normalizeId(row.descriptor_id);
          const exportRow = {
            descriptor_id: descriptorId === previousDescriptorId && fieldName === previousFieldName ? "" : descriptorId,
            field_name: fieldName === previousFieldName ? "" : fieldName,
            option_id: normalizeId(row.option_id),
            tag: getRowDisplayTag(row)
          };
          previousDescriptorId = descriptorId;
          previousFieldName = fieldName;
          return CVDA_ID_HEADERS.map(header => csvValue(exportRow[header])).join(",");
        })
      ];
      return "\uFEFF" + lines.join("\r\n") + "\r\n";
    }

    function downloadCsv(fileName, rows, headers) {
      const blob = new Blob([serializeCsv(rows, headers)], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadText(fileName, text, type) {
      const blob = new Blob([text], { type: type || "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function serializeConditionsDelta(rows) {
      return serializeConditionsIntercom(rows);
    }

    function serializeConditionsIntercom(rows) {
      const groups = new Map();
      (rows || []).forEach(row => {
        const ifOptionIs = normalizeText(row.ifOptionIs);
        const thenShow = normalizeText(row.thenShow);
        if (!ifOptionIs || !thenShow) {
          return;
        }
        const conditionId = resolveConditionId(row);
        const concreteConditionId = concreteId(conditionId);
        const resolvedIfOptionId = resolveConditionIfOptionId(row);
        const resolvedDependentDescriptorId = resolveConditionDependentDescriptorId(row);
        const key = [
          concreteConditionId || resolvedIfOptionId || normalizeText(row.rootTag) || extractTagCode(ifOptionIs) || ifOptionIs,
          resolvedDependentDescriptorId || thenShow
        ].join("|");
        if (!groups.has(key)) {
          groups.set(key, {
            condition_id: conditionId,
            controlling_descriptor_id: resolveConditionControllingDescriptorId(row),
            if_option_id: resolvedIfOptionId,
            ifOptionIs,
            dependent_descriptor_id: resolvedDependentDescriptorId,
            thenShow,
            rows: []
          });
        }
        groups.get(key).rows.push(row);
      });

      const lines = [CONDITION_ID_HEADERS.map(csvValue).join(",")];
      Array.from(groups.values())
        .sort((a, b) => [a.ifOptionIs, a.thenShow].join("|").localeCompare([b.ifOptionIs, b.thenShow].join("|"), "ru"))
        .forEach(group => {
          const wildcard = isWildcardConditionGroup(group.rows);
          if (wildcard) {
            lines.push(CONDITION_ID_HEADERS.map(header => csvValue({
              condition_id: group.condition_id || NEW_ID,
              controlling_descriptor_id: group.controlling_descriptor_id,
              if_option_id: group.if_option_id,
              "If option is": group.ifOptionIs,
              dependent_descriptor_id: group.dependent_descriptor_id,
              "Then show": group.thenShow,
              dependent_option_id: "*",
              "With these options": ""
            }[header])).join(","));
            return;
          }

          group.rows
            .filter(row => normalizeText(row.withTheseOptions) || normalizeId(row.dependent_option_id))
            .sort((a, b) => normalizeText(a.withTheseOptions || a.dependent_option_id).localeCompare(normalizeText(b.withTheseOptions || b.dependent_option_id), "ru"))
            .forEach((row, index) => {
              const item = {
                condition_id: index === 0 ? (group.condition_id || NEW_ID) : "",
                controlling_descriptor_id: index === 0 ? group.controlling_descriptor_id : "",
                if_option_id: index === 0 ? group.if_option_id : "",
                "If option is": index === 0 ? group.ifOptionIs : "",
                dependent_descriptor_id: index === 0 ? group.dependent_descriptor_id : "",
                "Then show": index === 0 ? group.thenShow : "",
                dependent_option_id: resolveConditionDependentOptionId(row) || "",
                "With these options": row.withTheseOptions
              };
              lines.push(CONDITION_ID_HEADERS.map(header => csvValue(item[header])).join(","));
            });
        });

      return lines.join("\r\n") + "\r\n";
    }

    function importRows(rows, fileName) {
      state.rows = rows;
      state.fileName = fileName || "helpdesk_tag_taxonomy.csv";
      state.selectedTagId = "";
      state.selectedMacroId = "";
      const firstGroup = getGroups()[0];
      state.selectedGroupKey = firstGroup ? firstGroup.key : "";
      state.editorMode = state.selectedGroupKey ? "group" : "empty";
      render();
    }

    function importConditions(rows, fileName) {
      state.conditionsRows = rows;
      state.conditionsFileName = fileName || "conditions.csv";
      state.newConditionRows = [];
      state.selectedConditionTag = "";
      const roots = getConditionRoots();
      if (!roots.some(root => root.tag === state.selectedConditionRoot)) {
        state.selectedConditionRoot = roots[0] ? roots[0].tag : "";
      }
      render();
    }

    function parseMacrosMarkdown(text) {
      const normalized = String(text || "").replace(/^\uFEFF/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const blocks = normalized.split(/^---\s*$/m).map(block => block.trim()).filter(Boolean);
      return blocks.map((block, index) => {
        const lines = block.split("\n");
        const titleLine = normalizeText(lines.shift());
        const tagLine = normalizeText(lines.shift());
        if (!titleLine.startsWith("# ")) {
          throw new Error("Макрос " + (index + 1) + ": заголовок должен начинаться с #.");
        }
        if (!tagLine.startsWith("[tag]")) {
          throw new Error("Макрос " + (index + 1) + ": вторая строка должна начинаться с [tag].");
        }
        return {
          id: makeMacroId(),
          title: normalizeText(titleLine.replace(/^#+\s*/, "")),
          tags: parseTagList(tagLine.replace(/^\[tag\]\s*/, "")),
          body: lines.join("\n").trim()
        };
      });
    }

    function serializeMacrosMarkdown(macros) {
      return macros.map(macro => [
        "# " + normalizeText(macro.title),
        "[tag] " + macro.tags.map(normalizeText).filter(Boolean).join(", "),
        normalizeText(macro.body),
        "---"
      ].join("\n")).join("\n\n") + "\n";
    }

    function importMacros(macros, fileName) {
      state.macros = macros;
      state.macroFileName = fileName || "macros_markdown.txt";
      state.selectedMacroId = "";
      state.editorMode = state.selectedGroupKey ? "group" : "empty";
      render();
    }

    function getGroups() {
      const map = new Map();
      state.rows.forEach(row => {
        const key = groupKey(row.field, row.category);
        if (!map.has(key)) {
          map.set(key, {
            key,
            field: row.field,
            category: row.category,
            total: 0,
            active: 0,
            archived: 0
          });
        }
        const group = map.get(key);
        group.total += 1;
        if (row.operator_selectable === "yes") {
          group.active += 1;
        } else {
          group.archived += 1;
        }
      });

      return Array.from(map.values()).sort((a, b) => {
        const fieldOrder = a.field.localeCompare(b.field, "ru");
        if (fieldOrder !== 0) {
          return fieldOrder;
        }
        return a.category.localeCompare(b.category, "ru");
      });
    }

    function getFields() {
      const fields = new Set(CORE_FIELDS);
      state.rows.forEach(row => {
        if (row.field) {
          fields.add(row.field);
        }
      });
      return Array.from(fields).sort(compareFields);
    }

    function getActiveConversationTags() {
      return state.rows
        .filter(row => row.field === "conversation" && row.operator_selectable === "yes")
        .slice()
        .sort((a, b) => a.tag.localeCompare(b.tag, "ru"));
    }

    function getConditionRoots() {
      const rootMap = new Map();

      getActiveConversationTags()
        .filter(row => row.tag.startsWith("op."))
        .forEach(row => {
          rootMap.set(row.tag, {
            tag: row.tag,
            descriptor_id: normalizeId(row.descriptor_id),
            option_id: normalizeId(row.option_id),
            label: composeDisplayTag(row.tag, row.ru_label),
            fromTaxonomy: true
          });
        });

      state.conditionsRows.forEach(row => {
        if (!normalizeText(row.rootTag)) {
          return;
        }
        if (!rootMap.has(row.rootTag)) {
          rootMap.set(row.rootTag, {
            tag: row.rootTag,
            descriptor_id: normalizeId(row.controlling_descriptor_id),
            option_id: normalizeId(row.if_option_id),
            label: row.ifOptionIs || row.rootTag,
            fromTaxonomy: false
          });
        }
      });

      return Array.from(rootMap.values()).sort((a, b) => a.label.localeCompare(b.label, "ru"));
    }

    function getConditionFields() {
      const fieldMap = new Map();

      getActiveConversationTags()
        .filter(row => !row.tag.startsWith("op."))
        .forEach(row => {
          const sourceName = normalizeText(row.field_name || row.category);
          const thenShow = cleanConditionFieldName(sourceName);
          if (!thenShow) {
            return;
          }
          if (!fieldMap.has(thenShow)) {
            fieldMap.set(thenShow, {
              thenShow,
              sourceName,
              descriptor_id: normalizeId(row.descriptor_id),
              fromTaxonomy: true,
              options: [],
              optionTags: new Set()
            });
          }
          const field = fieldMap.get(thenShow);
          if (!field.optionTags.has(row.tag)) {
            field.optionTags.add(row.tag);
            field.options.push({
              tag: row.tag,
              option_id: normalizeId(row.option_id),
              display: getRowDisplayTag(row),
              label: normalizeText(row.ru_label),
              fromTaxonomy: true
            });
          }
        });

      state.conditionsRows.forEach(row => {
        const thenShow = normalizeText(row.thenShow);
        if (!thenShow) {
          return;
        }
        if (!fieldMap.has(thenShow)) {
          fieldMap.set(thenShow, {
            thenShow,
            sourceName: thenShow,
            descriptor_id: normalizeId(row.dependent_descriptor_id),
            fromTaxonomy: false,
            options: [],
            optionTags: new Set()
          });
        }
        if (!normalizeText(row.childTag)) {
          return;
        }
        const field = fieldMap.get(thenShow);
        if (!field.optionTags.has(row.childTag)) {
          field.optionTags.add(row.childTag);
          field.options.push({
            tag: row.childTag,
            option_id: normalizeId(row.dependent_option_id),
            display: normalizeText(row.withTheseOptions) || row.childTag,
            label: "",
            fromTaxonomy: false
          });
        }
      });

      return Array.from(fieldMap.values())
        .map(field => {
          field.options = field.options
            .slice()
            .sort((a, b) => a.tag.localeCompare(b.tag, "ru"));
          delete field.optionTags;
          return field;
        })
        .sort((a, b) => a.thenShow.localeCompare(b.thenShow, "ru"));
    }

    function getConditionField(thenShow) {
      const value = normalizeText(thenShow);
      return getConditionFields().find(field => field.thenShow === value) || null;
    }

    function getConditionGroup(rootTag, thenShow) {
      const root = normalizeText(rootTag);
      const field = normalizeText(thenShow);
      return state.conditionsRows
        .filter(row => row.rootTag === root && normalizeText(row.thenShow) === field)
        .slice()
        .sort((a, b) => {
          const left = normalizeText(a.childTag || a.withTheseOptions);
          const right = normalizeText(b.childTag || b.withTheseOptions);
          return left.localeCompare(right, "ru");
        });
    }

    function isWildcardConditionGroup(rows) {
      return (rows || []).some(row => normalizeId(row.dependent_option_id) === "*" || (!normalizeText(row.withTheseOptions) && !normalizeText(row.childTag)));
    }

    function getConfiguredConditionFieldCount(rootTag) {
      const fields = new Set();
      state.conditionsRows.forEach(row => {
        if (row.rootTag === rootTag && normalizeText(row.thenShow)) {
          fields.add(normalizeText(row.thenShow));
        }
      });
      return fields.size;
    }

    function getConditionOptionDisplay(thenShow, tag) {
      const field = getConditionField(thenShow);
      const option = field ? field.options.find(item => item.tag === tag) : null;
      return option ? option.display : tag;
    }

    function getConditionOptionId(thenShow, tag) {
      const field = getConditionField(thenShow);
      const option = field ? field.options.find(item => item.tag === tag) : null;
      return option ? normalizeId(option.option_id) : "";
    }

    function concreteId(value) {
      const id = normalizeId(value);
      return id && !isNewId(id) ? id : "";
    }

    function firstConcreteId(rows, fieldName) {
      const row = (rows || []).find(item => concreteId(item[fieldName]));
      return row ? concreteId(row[fieldName]) : "";
    }

    function getConditionRootInfo(rootTag) {
      const tag = normalizeText(rootTag);
      return getConditionRoots().find(item => item.tag === tag) || null;
    }

    function getConditionRootTagFromRow(row) {
      return normalizeText(row.rootTag) || extractTagCode(row.ifOptionIs);
    }

    function getConditionRootInfoFromRow(row) {
      return getConditionRootInfo(getConditionRootTagFromRow(row));
    }

    function resolveConditionId(row) {
      return normalizeId(row.condition_id) || NEW_ID;
    }

    function resolveConditionControllingDescriptorId(row) {
      const rootInfo = getConditionRootInfoFromRow(row);
      return concreteId(rootInfo?.descriptor_id) || concreteId(row.controlling_descriptor_id);
    }

    function resolveConditionIfOptionId(row) {
      const rootInfo = getConditionRootInfoFromRow(row);
      return concreteId(rootInfo?.option_id) || concreteId(row.if_option_id);
    }

    function resolveConditionDependentDescriptorId(row) {
      const field = getConditionField(row.thenShow);
      return concreteId(field?.descriptor_id) || concreteId(row.dependent_descriptor_id);
    }

    function resolveConditionDependentOptionId(row) {
      if (normalizeId(row.dependent_option_id) === "*") {
        return "*";
      }
      const tag = normalizeText(row.childTag) || extractTagCode(row.withTheseOptions);
      const optionId = tag ? getConditionOptionId(row.thenShow, tag) : "";
      return concreteId(optionId) || concreteId(row.dependent_option_id);
    }

    function getConditionRootDisplay(rootTag) {
      const root = getConditionRoots().find(item => item.tag === rootTag);
      return root ? root.label : rootTag;
    }

    function replaceConditionGroup(rootTag, thenShow, mode, optionTags) {
      const root = normalizeText(rootTag);
      const field = normalizeText(thenShow);
      const selectedTags = Array.from(new Set((optionTags || []).map(normalizeText).filter(Boolean)));
      const rootInfo = getConditionRoots().find(item => item.tag === root) || {};
      const rootDisplay = rootInfo.label || root;
      const dependentField = getConditionField(field) || {};
      const existingRows = getConditionGroup(root, field);
      const existingConditionId = normalizeId(existingRows.find(row => normalizeId(row.condition_id))?.condition_id) || NEW_ID;
      const existingControllingDescriptorId = firstConcreteId(existingRows, "controlling_descriptor_id");
      const existingIfOptionId = firstConcreteId(existingRows, "if_option_id");
      const existingDependentDescriptorId = firstConcreteId(existingRows, "dependent_descriptor_id");

      state.conditionsRows = state.conditionsRows.filter(row => !(row.rootTag === root && normalizeText(row.thenShow) === field));

      if (mode === "clear") {
        state.newConditionRows = [];
        return;
      }

      if (mode === "all") {
        state.conditionsRows.push({
          id: makeConditionId(),
          condition_id: existingConditionId,
          controlling_descriptor_id: existingControllingDescriptorId || normalizeId(rootInfo.descriptor_id),
          if_option_id: existingIfOptionId || normalizeId(rootInfo.option_id),
          ifOptionIs: rootDisplay,
          dependent_descriptor_id: existingDependentDescriptorId || normalizeId(dependentField.descriptor_id),
          thenShow: field,
          dependent_option_id: "*",
          withTheseOptions: "",
          rootTag: root,
          childTag: ""
        });
        state.newConditionRows = [];
        return;
      }

      selectedTags.forEach(tag => {
        state.conditionsRows.push({
          id: makeConditionId(),
          condition_id: existingConditionId,
          controlling_descriptor_id: existingControllingDescriptorId || normalizeId(rootInfo.descriptor_id),
          if_option_id: existingIfOptionId || normalizeId(rootInfo.option_id),
          ifOptionIs: rootDisplay,
          dependent_descriptor_id: existingDependentDescriptorId || normalizeId(dependentField.descriptor_id),
          thenShow: field,
          dependent_option_id: getConditionOptionId(field, tag) || NEW_ID,
          withTheseOptions: getConditionOptionDisplay(field, tag),
          rootTag: root,
          childTag: tag
        });
      });
      state.newConditionRows = [];
    }

    function getConditionRowsForRoot(rootTag) {
      return state.conditionsRows
        .filter(row => row.rootTag === rootTag && normalizeText(row.thenShow))
        .slice()
        .sort((a, b) => {
          const left = [a.thenShow, a.withTheseOptions].join("|");
          const right = [b.thenShow, b.withTheseOptions].join("|");
          return left.localeCompare(right, "ru");
        });
    }

    function getConfiguredConditionTagsForRoot(rootTag) {
      return new Set(getConditionRowsForRoot(rootTag).map(row => row.childTag).filter(Boolean));
    }

    function getAvailableConditionTagsForRoot(rootTag) {
      const configured = getConfiguredConditionTagsForRoot(rootTag);
      return getActiveConversationTags()
        .filter(row => !row.tag.startsWith("op.") && !configured.has(row.tag))
        .filter(row => rowMatchesSearch(row))
        .sort((a, b) => a.tag.localeCompare(b.tag, "ru"));
    }

    function getConditionThenShowOptions() {
      return getConditionFields().map(field => field.thenShow);
    }

    function getMacroCountForTag(tag) {
      return state.macros.filter(macro => macro.tags.includes(tag)).length;
    }

    function getGroupTagSet(key) {
      return new Set(getGroupRows(key).map(row => row.tag).filter(Boolean));
    }

    function getMacroCountForGroup(key) {
      if (!key) {
        return state.macros.length;
      }
      const tags = getGroupTagSet(key);
      if (!tags.size) {
        return 0;
      }
      return state.macros.filter(macro => macro.tags.some(tag => tags.has(tag))).length;
    }

    function compareFields(a, b) {
      const aIndex = CORE_FIELDS.indexOf(a);
      const bIndex = CORE_FIELDS.indexOf(b);
      if (aIndex !== -1 || bIndex !== -1) {
        if (aIndex === -1) {
          return 1;
        }
        if (bIndex === -1) {
          return -1;
        }
        return aIndex - bIndex;
      }
      return a.localeCompare(b, "ru");
    }

    function fieldTitle(field) {
      if (field === "__all__") {
        return "ALL";
      }
      if (field === "user") {
        return "User Tags";
      }
      if (field === "conversation") {
        return "Conversation Tags";
      }
      return field + " Tags";
    }

    function renderFieldOptions(selectedField) {
      const fields = getFields();
      if (selectedField && !fields.includes(selectedField)) {
        fields.push(selectedField);
      }
      return fields.map(field => (
        '<option value="' + escapeHtml(field) + '"' + selected(field, selectedField) + '>' + escapeHtml(field) + '</option>'
      )).join("");
    }

    function renderFieldModeControl(selectedField) {
      return [
        '<div class="field"><label>Field</label><select id="fieldMode" name="fieldMode">',
        renderFieldOptions(selectedField),
        '<option value="__new__">Создать новый field</option>',
        '</select></div>',
        '<div class="field" id="newFieldRow" style="display:none"><label>Новый field</label><input id="newFieldInput" name="new_field" placeholder="product"></div>'
      ].join("");
    }

    function setupFieldModeControl() {
      const fieldMode = document.getElementById("fieldMode");
      const newFieldRow = document.getElementById("newFieldRow");
      const newFieldInput = document.getElementById("newFieldInput");
      if (!fieldMode || !newFieldRow || !newFieldInput) {
        return;
      }
      const syncNewField = () => {
        const isNewField = fieldMode.value === "__new__";
        newFieldRow.style.display = isNewField ? "" : "none";
        newFieldInput.required = isNewField;
        newFieldInput.disabled = !isNewField;
        if (isNewField) {
          newFieldInput.focus();
        }
      };
      fieldMode.addEventListener("change", syncNewField);
      syncNewField();
    }

    function resolveFieldFromForm(raw) {
      const field = raw.fieldMode === "__new__" ? normalizeText(raw.new_field) : normalizeText(raw.fieldMode || raw.field);
      if (!field) {
        alert("Field не может быть пустым.");
        return "";
      }
      if (!FIELD_PATTERN.test(field)) {
        alert("Field должен быть lowercase latin/digits/underscore и начинаться с буквы.");
        return "";
      }
      return field;
    }

    function rowMatchesSearch(row) {
      if (!state.search) {
        return true;
      }
      const haystack = [
        row.field_name,
        row.tag,
        getRowDisplayTag(row),
        row.ru_label,
        row.field
      ].join(" ").toLowerCase();
      return haystack.includes(state.search.toLowerCase());
    }

    function macroMatchesSearch(macro) {
      if (!state.search) {
        return true;
      }
      const needle = state.search.toLowerCase();
      const tagMatch = macro.tags.some(tag => tag.toLowerCase().includes(needle));
      if (tagMatch) {
        return true;
      }
      const haystack = [macro.title, macro.body].join(" ").toLowerCase();
      return haystack.includes(needle);
    }

    function macroMatchesScope(macro) {
      if (!state.selectedGroupKey && !state.selectedTagId) {
        return true;
      }
      if (state.selectedTagId) {
        const tag = getSelectedTag();
        return tag ? macro.tags.includes(tag.tag) : true;
      }
      if (state.selectedGroupKey) {
        const tags = getGroupTagSet(state.selectedGroupKey);
        return !tags.size || macro.tags.some(tag => tags.has(tag));
      }
      return true;
    }

    function getVisibleMacros() {
      return state.macros
        .filter(macroMatchesScope)
        .filter(macroMatchesSearch)
        .sort((a, b) => a.title.localeCompare(b.title, "ru"));
    }

    function groupMatchesSearch(group) {
      if (!state.search) {
        return true;
      }
      const ownText = [group.field, group.category].join(" ").toLowerCase();
      if (ownText.includes(state.search.toLowerCase())) {
        return true;
      }
      if (state.mode === "macros") {
        const tags = getGroupTagSet(group.key);
        if (Array.from(tags).some(tag => tag.toLowerCase().includes(state.search.toLowerCase()))) {
          return true;
        }
        return state.macros.some(macro => macro.tags.some(tag => tags.has(tag)) && macroMatchesSearch(macro));
      }
      return getGroupRows(group.key).some(rowMatchesSearch);
    }

    function validateRows() {
      const errors = [];
      const warnings = [];
      const byTag = new Map();

      state.rows.forEach((row, index) => {
        const line = index + 2;
        if (!normalizeText(row.field_name)) {
          errors.push("Строка " + line + ": пустое поле field_name.");
        }
        if (!normalizeText(getRowDisplayTag(row))) {
          errors.push("Строка " + line + ": пустое поле tag.");
        }

        const tagCode = getRowTagCode(row);
        if (!tagCode || !TAG_PATTERN.test(tagCode)) {
          errors.push("Строка " + line + ": неверное имя тега " + (tagCode || getRowDisplayTag(row)) + ".");
        }

        if (tagCode) {
          if (!byTag.has(tagCode)) {
            byTag.set(tagCode, []);
          }
          byTag.get(tagCode).push(line);
        }
      });

      byTag.forEach((lines, tag) => {
        if (lines.length > 1) {
          errors.push("Дубль tag " + tag + " в строках " + lines.join(", ") + ".");
        }
      });

      return { errors, warnings };

      state.rows.forEach((row, index) => {
        const line = index + 2;
        HEADERS.forEach(header => {
          if (!normalizeText(row[header])) {
            errors.push("Строка " + line + ": пустое поле " + header + ".");
          }
        });

        if (row.field && !FIELD_PATTERN.test(row.field)) {
          errors.push("Строка " + line + ": field должен быть lowercase latin/digits/underscore и начинаться с буквы.");
        }

        if (row.operator_selectable && !VALID_SELECTABLE.has(row.operator_selectable)) {
          errors.push("Строка " + line + ": operator_selectable должен быть yes или no.");
        }

        if (row.tag && !TAG_PATTERN.test(row.tag)) {
          errors.push("Строка " + line + ": неверное имя тега " + row.tag + ".");
        }

        if (row.tag) {
          if (!byTag.has(row.tag)) {
            byTag.set(row.tag, []);
          }
          byTag.get(row.tag).push(line);
        }

        const parts = String(row.tag || "").split(".");
        const expectedCategory = parts[0] === row.field ? parts[1] : parts[0];
        if (row.category && expectedCategory && row.category !== expectedCategory) {
          warnings.push("Строка " + line + ": category " + row.category + " не совпадает с ожидаемым сегментом " + expectedCategory + " для " + row.tag + ".");
        }
      });

      byTag.forEach((lines, tag) => {
        if (lines.length > 1) {
          errors.push("Дубль tag " + tag + " в строках " + lines.join(", ") + ".");
        }
      });

      return { errors, warnings };
    }

    function validateMacros() {
      const errors = [];
      const warnings = [];
      const knownTags = getKnownTags();

      state.macros.forEach((macro, index) => {
        const number = index + 1;
        if (!normalizeText(macro.title)) {
          errors.push("Макрос " + number + ": пустой заголовок.");
        }
        if (!normalizeText(macro.body)) {
          errors.push("Макрос " + number + ": пустое тело.");
        }
        if (!macro.tags.length) {
          errors.push("Макрос " + number + ": нет тегов.");
        }
        macro.tags.forEach(tag => {
          if (!TAG_PATTERN.test(tag)) {
            errors.push("Макрос " + number + ": неверное имя тега " + tag + ".");
          } else if (!knownTags.has(tag)) {
            warnings.push("Макрос " + number + ": тег " + tag + " не найден в taxonomy.");
          }
        });
      });

      return { errors, warnings };
    }

    function validateConditions() {
      const errors = [];
      const warnings = [];
      const roots = new Set(getConditionRoots().map(root => root.tag));
      const fields = new Map(getConditionFields().map(field => [field.thenShow, new Set(field.options.map(option => option.tag))]));

      state.conditionsRows.forEach((row, index) => {
        const line = index + 2;
        if (!normalizeText(row.ifOptionIs)) {
          errors.push("Строка " + line + ": пустое значение If option is.");
        }
        if (!normalizeText(row.thenShow)) {
          errors.push("Строка " + line + ": пустое значение Then show.");
        }
        if (normalizeText(row.rootTag) && !roots.has(row.rootTag)) {
          warnings.push("Строка " + line + ": root tag " + row.rootTag + " не найден в CvDA catalog.");
        }
        if (normalizeText(row.thenShow) && !fields.has(normalizeText(row.thenShow))) {
          warnings.push("Строка " + line + ": поле " + row.thenShow + " не найдено в CvDA catalog.");
        }
        if (normalizeText(row.childTag)) {
          const options = fields.get(normalizeText(row.thenShow));
          if (options && !options.has(row.childTag)) {
            warnings.push("Строка " + line + ": option " + row.childTag + " не найден в группе " + row.thenShow + ".");
          }
        }
        if (!resolveConditionControllingDescriptorId(row)) {
          errors.push("Line " + line + ": controlling_descriptor_id was not resolved from CvDA catalog.");
        }
        if (!resolveConditionIfOptionId(row)) {
          errors.push("Line " + line + ": if_option_id was not resolved from CvDA catalog.");
        }
        if (!resolveConditionDependentDescriptorId(row)) {
          errors.push("Line " + line + ": dependent_descriptor_id was not resolved from CvDA catalog.");
        }
        const wildcard = normalizeId(row.dependent_option_id) === "*" || (!normalizeText(row.withTheseOptions) && !normalizeText(row.childTag));
        if (!wildcard && !resolveConditionDependentOptionId(row)) {
          errors.push("Line " + line + ": dependent_option_id was not resolved from CvDA catalog.");
        }
      });

      return { errors, warnings };
    }

    function getStats(validation) {
      return [
        { label: "Groups", value: getGroups().length },
        { label: "Tags", value: state.rows.length },
        { label: "Errors", value: validation.errors.length },
        { label: "Warnings", value: validation.warnings.length }
      ];

      const activeUser = state.rows.filter(row => row.field === "user" && row.operator_selectable === "yes").length;
      const activeConversation = state.rows.filter(row => row.field === "conversation" && row.operator_selectable === "yes").length;
      const fieldCount = getFields().filter(field => state.rows.some(row => row.field === field)).length;
      const archived = state.rows.filter(row => row.operator_selectable === "no").length;
      return [
        { label: "User active", value: activeUser },
        { label: "Conversation active", value: activeConversation },
        { label: "Fields", value: fieldCount },
        { label: "Archived", value: archived },
        { label: "Errors", value: validation.errors.length },
        { label: "Warnings", value: validation.warnings.length }
      ];
    }

    function getMacroStats(validation) {
      const usedTags = new Set();
      state.macros.forEach(macro => {
        macro.tags.forEach(tag => usedTags.add(tag));
      });
      return [
        { label: "Macros", value: state.macros.length },
        { label: "Used tags", value: usedTags.size },
        { label: "Visible", value: getVisibleMacros().length },
        { label: "Errors", value: validation.errors.length },
        { label: "Warnings", value: validation.warnings.length }
      ];
    }

    function getConditionStats(validation) {
      const groupKeys = new Set();
      let wildcards = 0;
      state.conditionsRows.forEach(row => {
        if (normalizeText(row.rootTag) && normalizeText(row.thenShow)) {
          groupKeys.add(row.rootTag + "|" + normalizeText(row.thenShow));
        }
        if (!normalizeText(row.withTheseOptions) && !normalizeText(row.childTag)) {
          wildcards += 1;
        }
      });
      return [
        { label: "Roots", value: getConditionRoots().length },
        { label: "Fields", value: getConditionFields().length },
        { label: "Groups", value: groupKeys.size },
        { label: "Rows", value: state.conditionsRows.length },
        { label: "Wildcards", value: wildcards },
        { label: "Errors", value: validation.errors.length },
        { label: "Warnings", value: validation.warnings.length }
      ];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function iconSvg(name) {
      const icons = {
        import: '<path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M4 15v3a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-3"></path>',
        export: '<path d="M12 21V9"></path><path d="m17 16-5 5-5-5"></path><path d="M4 9V6a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v3"></path>',
        tags: '<path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0L3 13V3h10l7.6 7.6a2 2 0 0 1 0 2.8Z"></path><path d="M7.5 7.5h.01"></path>',
        macros: '<path d="M8 7H5a2 2 0 0 0-2 2v1a2 2 0 0 0 2 2h3"></path><path d="M16 7h3a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-3"></path><path d="M8 17h8"></path><path d="M8 12h8"></path>',
        conditions: '<path d="M9 6h11"></path><path d="M9 12h11"></path><path d="M9 18h11"></path><path d="M4 6h.01"></path><path d="M4 12h.01"></path><path d="M4 18h.01"></path>',
        save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path>'
      };
      return '<svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">' + (icons[name] || "") + '</svg>';
    }

    function setButtonContent(button, icon, label) {
      button.innerHTML = iconSvg(icon) + '<span>' + escapeHtml(label) + '</span>';
    }

    function render() {
      const validation = validateRows();
      const macroValidation = validateMacros();
      const conditionValidation = validateConditions();
      const hasErrors = validation.errors.length > 0;
      const hasRows = state.rows.length > 0;
      const hasMacros = state.macros.length > 0;
      const hasMacroErrors = macroValidation.errors.length > 0;
      const hasConditionErrors = conditionValidation.errors.length > 0;

      els.fileStatus.textContent = state.mode === "tags"
        ? (hasRows ? state.fileName + " | " + state.rows.length + " строк" : "CSV не загружен")
        : [
          hasRows ? "taxonomy: " + state.rows.length + " строк" : "taxonomy не загружена",
          hasMacros ? (state.macroFileName + " | " + state.macros.length + " макросов") : "macros не загружены"
        ].join(" | ");

      if (state.mode === "conditions") {
        els.fileStatus.textContent = [
          hasRows ? "taxonomy: " + state.rows.length + " строк" : "taxonomy не загружена",
          state.conditionsRows.length ? (state.conditionsFileName + " | " + state.conditionsRows.length + " conditions") : "conditions не загружены"
        ].join(" | ");
      }
      els.modeTagsButton.classList.toggle("active", state.mode === "tags");
      els.modeMacrosButton.classList.toggle("active", state.mode === "macros");
      els.modeConditionsButton.classList.toggle("active", state.mode === "conditions");
      els.shell.classList.toggle("macro-mode", state.mode === "macros");
      els.shell.classList.toggle("conditions-mode", state.mode === "conditions");
      els.tagList.className = state.mode === "macros" ? "macro-list" : (state.mode === "conditions" ? "condition-field-list" : "tag-grid");
      els.saveDownloadButton.disabled = state.mode === "tags" ? (!hasRows || hasErrors) : (!hasMacros || hasMacroErrors);
      if (state.mode === "conditions") {
        els.saveDownloadButton.disabled = !hasRows || hasConditionErrors;
      }
      els.exportTagImportButton.style.display = state.mode === "tags" ? "" : "none";
      els.exportTagImportButton.disabled = !hasRows || hasErrors;
      setButtonContent(els.importButton, "import", "Импорт");
      setButtonContent(els.modeTagsButton, "tags", "Tags");
      setButtonContent(els.modeMacrosButton, "macros", "Macros");
      setButtonContent(els.modeConditionsButton, "conditions", "CvDA Conditions");
      setButtonContent(els.exportTagImportButton, "export", "Экспорт");
      setButtonContent(els.saveDownloadButton, "save", "Save and Download");
      if (state.mode === "conditions") {
        setButtonContent(els.saveDownloadButton, "save", "Export ID CSV");
      }
      els.fileInput.accept = state.mode === "tags"
        ? ".csv,text/csv,text/plain,application/csv,application/vnd.ms-excel,application/octet-stream"
        : ".txt,.md,text/plain,text/markdown";
      if (state.mode === "conditions") {
        els.fileInput.accept = ".csv,text/csv,text/plain,application/csv,application/vnd.ms-excel,application/octet-stream";
      }
      els.searchInput.placeholder = state.mode === "tags"
        ? "Поиск по tag, label, usage или category"
        : "Поиск по тегам, названию или тексту макроса";
      if (state.mode === "conditions") {
        els.searchInput.placeholder = "Поиск по root, then show или тегу";
      }
      els.newGroupButton.style.display = state.mode === "tags" ? "" : "none";
      els.newTagButton.textContent = state.mode === "tags" ? "+ Тег" : "+ Макрос";

      els.newTagButton.style.display = state.mode === "conditions" ? "none" : "";
      renderStats(state.mode === "tags" ? validation : macroValidation);
      renderValidation(state.mode === "tags" ? validation : macroValidation);
      if (state.mode === "conditions") {
        renderStats(conditionValidation);
        renderValidation(conditionValidation);
      }
      renderGroups();
      renderTags();
      renderEditor();
    }

    function renderStats(validation) {
      const stats = state.mode === "conditions"
        ? getConditionStats(validation)
        : (state.mode === "tags" ? getStats(validation) : getMacroStats(validation));
      els.stats.innerHTML = stats.map(item => (
        '<div class="stat"><strong>' + item.value + '</strong><span>' + escapeHtml(item.label) + '</span></div>'
      )).join("");
    }

    function renderValidation(validation) {
      if (state.mode === "conditions") {
        if (!state.rows.length) {
          els.validationBox.innerHTML = '<div class="message">Загрузите taxonomy, чтобы настраивать conditions.</div>';
          return;
        }
        if (!state.conditionsRows.length) {
          els.validationBox.innerHTML = '<div class="message">conditions.csv не загружен. Можно собрать новый Intercom CSV из редактора.</div>';
          return;
        }
        if (validation.errors.length) {
          const items = validation.errors.slice(0, 6).map(error => '<li>' + escapeHtml(error) + '</li>').join("");
          const more = validation.errors.length > 6 ? '<li>Еще ошибок: ' + (validation.errors.length - 6) + '.</li>' : "";
          els.validationBox.innerHTML = '<div class="message error"><strong>Экспорт conditions CSV заблокирован.</strong><ul class="validation-list">' + items + more + '</ul></div>';
          return;
        }
        if (validation.warnings.length) {
          const items = validation.warnings.slice(0, 6).map(warning => '<li>' + escapeHtml(warning) + '</li>').join("");
          const more = validation.warnings.length > 6 ? '<li>Еще предупреждений: ' + (validation.warnings.length - 6) + '.</li>' : "";
          els.validationBox.innerHTML = '<div class="message warning"><strong>Есть теги без conditions.</strong><ul class="validation-list">' + items + more + '</ul></div>';
          return;
        }
        els.validationBox.innerHTML = '<div class="message"><strong>Conditions проверены.</strong> Можно экспортировать ID-aware CSV.</div>';
        return;
      }

      if (state.mode === "macros") {
        if (!state.macros.length) {
          els.validationBox.innerHTML = '<div class="message">Загрузите macros_markdown.txt, чтобы начать редактирование макросов.</div>';
          return;
        }
        if (validation.errors.length) {
          const items = validation.errors.slice(0, 6).map(error => '<li>' + escapeHtml(error) + '</li>').join("");
          const more = validation.errors.length > 6 ? '<li>Еще ошибок: ' + (validation.errors.length - 6) + '.</li>' : "";
          els.validationBox.innerHTML = '<div class="message error"><strong>Экспорт макросов заблокирован.</strong><ul class="validation-list">' + items + more + '</ul></div>';
          return;
        }
        if (validation.warnings.length) {
          const items = validation.warnings.slice(0, 4).map(warning => '<li>' + escapeHtml(warning) + '</li>').join("");
          const more = validation.warnings.length > 4 ? '<li>Еще предупреждений: ' + (validation.warnings.length - 4) + '.</li>' : "";
          els.validationBox.innerHTML = '<div class="message warning"><strong>Можно экспортировать, есть неизвестные теги.</strong><ul class="validation-list">' + items + more + '</ul></div>';
          return;
        }
